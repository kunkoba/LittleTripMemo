<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Button</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <!-- グリッドレイアウトで2x2の均等配置に変更 -->
    <button class="relative w-20 h-20 bg-white shadow-md rounded-2xl">
        <!-- 左上 -->
        <span class="absolute top-0 left-0 text-[3.2rem] drop-shadow-md">😲</span>
        <!-- 右下 -->
        <span class="absolute bottom-0 right-0 text-[2rem] drop-shadow-md">🍓</span>
    </button>
    <div class="m-4"></div>
    <!-- グリッドレイアウトで2x2の均等配置に変更 -->
    <button class="relative w-10 h-10 bg-white shadow-md rounded-xl">
        <!-- 左上 -->
        <span class="absolute top-0 left-0 text-[1.6rem] drop-shadow-md">😲</span>
        <!-- 右下 -->
        <span class="absolute bottom-0 right-0 text-[1rem] drop-shadow-md">🍓</span>
    </button>

</body>
</html>
