    <script>
        var serviceWorker_on = 0;
        // ■Service Worker登録
        if (serviceWorker_on == 1) {
            if ('serviceWorker' in navigator) {     // ブラウザがService Workerをサポートしているか
                console.log('serviceWorker >> start');
                const test = '@test_ngrok';
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register(test + '/service-worker.js')
                    .then(registration => {
                        console.log('スコープに登録されたサービスワーカー：', registration.scope);
                        // displayToast('サービスワーカー成功！<br>' + registration.scope);
                    })
                    .catch(error => {
                        console.error('サービスワーカーの登録に失敗しました：', error);
                        errorProc("サービスワーカー失敗！", error);
                    });
                });
                console.log('serviceWorker >> end');
            }
        }

    </script>

    <!-- カスタムスクリプト -->
    <script src="js/myApp/app-context.js" asp-append-version="true"></script>
    <script src="js/myApp/app-common.js" asp-append-version="true"></script>
    <script src="js/myApp/app-map.js" asp-append-version="true"></script>
    <script src="js/myApp/app-data.js" asp-append-version="true"></script>
    <script src="js/myApp/app-indexedDB.js" asp-append-version="true"></script>
    <script src="js/myApp/app-useLocalDB.js" asp-append-version="true"></script>
    <script src="js/myApp/app-dialog.js" asp-append-version="true"></script>
    <script src="js/myApp/app-form.js" asp-append-version="true"></script>


<!--Scriptsセクション -->
    <!-- 独自スクリプト -->
    <script>
        // 初期表示
        $(document).ready(function () {
            // 長押しによる右クリックメニューを防ぐ
            mapArea.addEventListener("contextmenu", function(event) {
                event.preventDefault();
            });

            // ■■■■■　テスト用　■■■■■
            if (AppContext.dubug_mode) DebugProc();
            // 画面サイズ調整
            updateSize();
            window.addEventListener('resize', updateSize);
            console.log("◆◆ Main >> start");
            // トーストクリックで閉じるイベント
            $('#liveToast').on('click', function() {
                $(this).removeClass('show'); // 非表示にする
            });
            // ユーザ情報取得
            UserContext.userName = @Html.Raw(Json.Serialize(Model?.UserInfo?.NickName ?? ""));
            // 匿名判定
            AppStatus.isAnonymous = UserContext.userName == "";
            AppStatus.archive = @Html.Raw(Json.Serialize(Model.ResArchive));
            AppStatus.archiveId = AppStatus.archive.archiveId;
            if (AppStatus.archiveId > 0) {
                AppStatus.memos = @Html.Raw(Json.Serialize(Model.ResMemos));
                AppStatus.isPublish = true;
                console.log("AppStatus", AppStatus);
            }
            // 【画面表示】初回読み込み時
            initLoad();
            console.log("◆◆ Main >> end");
        });

        // ダブルクリック無効化
        document.addEventListener("dblclick", function(event) {
            event.preventDefault();
        });

        // オンライン復帰時（ページ）
        window.addEventListener("online", (event) => {
            OnlineProc();
        });

        // オフライン時（ページ）
        window.addEventListener("offline", (event) => {
            OfflineProc();
        });
        // 点滅メッセージ（ページ）
        (function blinkText() {
            const textElement = document.getElementById("textInfoMsg");
            let isVisible = true;
            setInterval(() => {
                if (isVisible) {
                    textElement.style.visibility = "hidden"; // 非表示
                } else {
                    textElement.style.visibility = "visible"; // 表示
                }
                isVisible = !isVisible;
            }, 1500); // 1秒表示 + 0.5秒非表示 = 1.5秒周期
        })();

        // オンライン復帰処理（ページ）
        setInterval(async () => {
            if (AppStatus.isOnLine) { // オンラインかを判定
                // サーバ更新処理
                await UploadRouteMemo();
            }
        }, AppContext.interval_upload_routeMemo * 1000 * 60);

        // リアクション更新処理（ページ）
        setInterval(async () => {
            if (AppStatus.isOnLine) { // オンラインかを判定
                // サーバ更新処理
                await UploadReAction();
            }
        }, AppContext.interval_upload_reAction * 1000 * 60);


        // アイコン群　表示切替え
        $("#toggleOption").on("click", function(event) {
            // console.log("#toggleOption");
            event.stopPropagation(); // イベントが親要素に伝播しないようにする
            $(".optionGroup").toggleClass("d-none");
            $(".optionGroup2").toggleClass("d-none");
        });
        // アイコン群　表示切替え
        $("#toggleOption2").on("click", function(event) {
            // console.log("#toggleOption2");
            event.stopPropagation(); // イベントが親要素に伝播しないようにする
            $(".optionGroup").toggleClass("d-none");
            $(".optionGroup2").toggleClass("d-none");
        });






        // 現在位置ボタン（ページ）
        $('#recenterBtn').on('click', function () {
            getLocation();
            drawMainArrow();
        });
        // 画面更新ボタン（ページ）
        $('#refreshBtn').on('click', function () {
            event.stopPropagation(); // 親要素のイベントを止める！
            RefreshScreen();
        });
        // データリストアイコン（ページ）
        $('#dataListBtn').on('click', function () {
            // リスト表示
            if (AppStatus.screenId == DEF_SCREEN_SEARCH) openDialogPointList(_PointList);
            else openDialogTimeLine(_PointList);
        });
        // アクションリスト（ページ）
        $('#actionListBtn').on('click', function () {
            // ダイアログを表示
            openDialogActionList();
        });
        // ユーザ情報リスト（ページ）
        $('#userInfoBtn').on('click', function () {
            // ダイアログを表示
            openDialogUserInfoList();
        });

        // 縮小ボタン
        $('#zoopDownBtn').on('click', function () {
            zoomDownMap();
        });
        // 拡大ボタン
        $('#zoopUpBtn').on('click', function () {
            zoomUpMap();
        });
        // ドアップボタン
        $('#zoopMaxBtn').on('click', async function () {
            setZoom(18);
        });
        // ガイド（使い方）ボタン
        $('#appGuideBtn').on('click', function () {
            openDialogAppGuide(AppStatus.screenId);
        });

        // ニュース（お知らせ）ボタン
        $('#appNewsBtn').on('click', function () {
            openDialogAppNews();
        });
        // フィードバックボタン
        $('#appFeedbackBtn').on('click', function () {
            openDialogFeedback();
        });

        // 地点移動アイコン　非表示切り替え
        $('#pointMoveIcon').click(function() {
            openPointMoveForm();
        });
        // まとめ情報開く
        $("#archiveTitleBtn").click(function() {
            const isOwnData = AppStatus.archive.isOwnData;
            // 画面を開く
            openDialogArchiveShow();
        });

        // 新規入力ボタン
        $('#inputBtn').on('click', async function (event) {
            event.stopPropagation(); // イベントが親要素に伝播しないようにする
            // フォームを開く
            openInputForm(true);
        });

        // マーカーポイント移動（前へ）
        $("#prevBtn").click(function() {
            event.stopPropagation(); // イベントが親要素に伝播しないようにする
            // インデックスを加算（過去へ戻る）
            moveMarkerPrev();
        });
        // マーカーポイント移動（次へ）
        $("#nextBtn").click(function() {
            event.stopPropagation(); // イベントが親要素に伝播しないようにする
            // インデックスを減算（未来へ進む）
            moveMarkerNext();
        });
        // マーカーポイント移動（先頭へ）
        $("#startBtn").click(function() {
            event.stopPropagation(); // イベントが親要素に伝播しないようにする
            // インデックスを減算（未来へ進む）
            moveMarkerStart();
        });
        // マーカーポイント移動（末尾へ）
        $("#endBtn").click(function() {
            event.stopPropagation(); // イベントが親要素に伝播しないようにする
            // インデックスを減算（未来へ進む）
            moveMarkerEnd();
        });


        // 地点検索（検索）
        $('#searchPointBtn').on('click', function () {
            // オフラインチェック
            if (!OfflineCheck()) return false;
            // 
            const isPublish = $('#GroupPublish .btn.active').data('value');
            AppStatus.isPublish = isPublish == 1 ? true: false;
            const sortId = $('#GroupSortId .btn.active').data('value');
            const orderBy = $('#GroupOrderBy .btn.active').data('value');
            // 地点検索
            searchByPointData(sortId, orderBy);
        });
        // 公開非公開ボタン（検索）
        $('#GroupPublish .btn').on('click', function() {
            let $this = $(this);
            $('#GroupPublish .btn').removeClass('active');
            $this.addClass('active');
            // クリックされたボタンの data-value を取得
            let value = $this.data('value');
            // 公開 (1) の場合は非表示、非公開 (0) の場合は表示
            if (value === 1) {
                toggleElementDisabled('#btnSortId-3', true);
            } else {
                toggleElementDisabled('#btnSortId-3', false);

                // 非公開選択時、かつ評価順選択時
                if ($('#btnSortId-3').hasClass('active')) {
                    $('#GroupSortId .btn').removeClass('active'); // すべてのアクティブを解除
                    $('#btnSortId-1').addClass('active'); // 日付順をアクティブにする
                }
            }
        });
        // ソート区分ボタン（検索）
        $('#GroupSortId .btn').on('click', function() {
            let $this = $(this);
            $('#GroupSortId .btn').removeClass('active');
            $this.addClass('active');
        });
        // オーダーボタン（検索）
        $('#GroupOrderBy .btn').on('click', function() {
            let $this = $(this);
            $('#GroupOrderBy .btn').removeClass('active');
            $this.addClass('active');
        });

    </script>

</body>

</html>
