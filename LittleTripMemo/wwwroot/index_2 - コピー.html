<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Sentiment UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .temp-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            padding: 12px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 2px solid transparent;
        }
        .temp-btn:hover { background: #f8fafc; transform: translateY(-2px); }
        .temp-btn.active { border-color: currentColor; }
        
        /* 5段階のテーマカラー (青～赤) */
        .temp-btn[data-value="-2"].active { color: #2563eb; background: #dbeafe; } /* 青: 極寒 */
        .temp-btn[data-value="-1"].active { color: #0891b2; background: #cffafe; } /* 水色: 肌寒い */
        .temp-btn[data-value="0"].active  { color: #059669; background: #d1fae5; } /* 緑: 快適 */
        .temp-btn[data-value="1"].active  { color: #ea580c; background: #ffedd5; } /* オレンジ: 暑い */
        .temp-btn[data-value="2"].active  { color: #dc2626; background: #fee2e2; } /* 赤: 猛暑 */
        
        .material-icons { font-size: 40px; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-sans text-slate-800">

    <div class="bg-white p-6 sm:p-8 rounded-3xl shadow-md w-full max-w-2xl border border-slate-100">
        <h2 class="text-xl font-bold text-slate-900 mb-2 text-center">今の気温はどう感じますか？</h2>
        <p class="text-sm text-slate-500 mb-8 text-center">左（青）が極寒、右（赤）が猛暑です</p>

        <div id="temp-container" class="grid grid-cols-5 gap-2 mb-8">
            <!-- 1. 極寒: Stressed (青系) -->
            <button class="temp-btn" data-value="-2" title="極寒">
                <span class="material-icons">sentiment_stressed</span>
            </button>
            <!-- 2. 肌寒い: Dissatisfied (水色系) -->
            <button class="temp-btn" data-value="-1" title="肌寒い">
                <span class="material-icons">sentiment_dissatisfied</span>
            </button>
            <!-- 3. 快適: Satisfied (緑系) -->
            <button class="temp-btn" data-value="0" title="快適">
                <span class="material-icons">sentiment_satisfied</span>
            </button>
            <!-- 4. 暑い: Frustrated (オレンジ系) -->
            <button class="temp-btn" data-value="1" title="暑い">
                <span class="material-icons">sentiment_frustrated</span>
            </button>
            <!-- 5. 猛暑: Very Dissatisfied (赤系) -->
            <button class="temp-btn" data-value="2" title="猛暑">
                <span class="material-icons">sentiment_very_dissatisfied</span>
            </button>
        </div>

        <div id="feedback-text" class="text-center text-sm font-bold text-slate-600 h-12 flex items-center justify-center bg-slate-50 rounded-xl mb-6 border border-slate-100 transition-all duration-300">
            選択してください
        </div>

        <button id="submit-btn" disabled class="w-full py-4 bg-slate-100 text-slate-400 rounded-xl font-bold transition-all duration-300">
            回答を確定する
        </button>
    </div>

    <script>
        const buttons = document.querySelectorAll('.temp-btn');
        const feedbackText = document.getElementById('feedback-text');
        const submitBtn = document.getElementById('submit-btn');

        const labels = {
            '-2': '凍えるような寒さです ❄️',
            '-1': '少し肌寒いです ☁️',
            '0': 'ちょうど快適です ✨',
            '1': '暑いですね ☀️',
            '2': '耐えられない猛暑です 🔥'
        };

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const value = btn.getAttribute('data-value');
                feedbackText.innerText = labels[value];
                feedbackText.classList.remove('bg-slate-50');
                
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-slate-100', 'text-slate-400');
                submitBtn.classList.add('bg-slate-900', 'text-white');
            });
        });

        submitBtn.addEventListener('click', () => {
            feedbackText.innerText = "ご回答ありがとうございます！";
            submitBtn.disabled = true;
            submitBtn.classList.remove('bg-slate-900');
            submitBtn.classList.add('bg-emerald-500');
            submitBtn.innerText = "送信しました";
        });
    </script>
</body>
</html>
