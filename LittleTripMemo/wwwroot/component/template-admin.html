<template id="tpl-admin-notice-edit">

    <div class="w-full text-black-5 space-y-6 pt-2 px-2">
        <!-- 1. 宛先ユーザー情報 (固定表示) -->

            <div id="admin-send-target-user-wrapper">

                    <span id="admin-send-target-name" class="text-[0.8rem] text-slate-600 tracking-tight line-clamp-1 font-black"></span>
                </button>
            </div>
        </div>
        <!-- 2. メッセージアイコン入力 (明細画面の MARKER レイアウト) -->
        <div class="px-1 w-[50%]">
            <label class="block font-black text-black-3 text-[0.6rem] mb-1 uppercase tracking-wider">Message Icon</label>
            <div class="flex items-center justify-between border-b-2 border-brand-3 pb-1">

        </div>
        <!-- 3. メッセージ本文 -->
        <div>
            <div class="flex justify-between items-end mb-1">
                <label class="block text-[0.7rem] font-bold uppercase text-slate-400">Message Body</label>
                <span class="text-[0.6rem] font-bold text-slate-300"><span id="admin-send-body-count">0</span>/300</span>
            </div>
            <textarea id="admin-send-body" maxlength="300" placeholder="ユーザーへのメッセージを入力してください" 
                class="w-full border-2 border-brand-3 px-4 py-3 text-[1rem] h-[200px] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white resize-none leading-relaxed"></textarea>
        </div>
    </div>
</template>
