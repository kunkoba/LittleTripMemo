<!-- 【ダイアログ子】システム設定（Core Config）編集 -->
<template id="tpl-admin-core-config">
    <div class="w-full text-slate-900 space-y-5 pt-2 px-2">
        <div class="bg-red-50 border-l-4 border-red-500 p-3">
            <p class="text-[0.8rem] text-red-700 font-bold">※システム基幹設定です。慎重に操作してください。</p>
        </div>
        <!-- アプリバージョン管理 -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[0.8rem] font-bold text-slate-600 uppercase mb-1">Latest Version</label>
                <input id="cfg-ver-latest" type="text" class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] rounded-lg focus:border-brand-5 outline-none font-bold">
            </div>
            <div>
                <label class="block text-[0.8rem] font-bold text-slate-600 uppercase mb-1">Min Version</label>
                <input id="cfg-ver-min" type="text" class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] rounded-lg focus:border-brand-5 outline-none font-bold">
            </div>
        </div>
        <!-- メンテナンス設定 -->
        <div class="space-y-3 pt-2 border-t border-slate-100">
            <div class="flex justify-between items-center">
                <div>
                    <span class="block text-[0.8rem] font-bold text-slate-900">Maintenance Mode</span>
                    <span id="desc-MaintenanceMode" class="text-[0.8rem] text-slate-600 italic"></span>
                </div>
                <button id="btn-cfg-maint" class="w-14 h-8 rounded-full bg-slate-300 relative transition-colors shrink-0">
                    <div class="js-dot absolute top-1 left-1 w-6 h-6 bg-white rounded-full transition-all"></div>
                </button>
                <input type="hidden" id="val-cfg-maint" value="false">
            </div>
            <div>
                <label class="block text-[0.8rem] font-bold text-slate-600 uppercase mb-1">Maintenance Message</label>
                <textarea id="cfg-maint-msg" class="w-full border-2 border-brand-3 px-3 py-2 text-[0.8rem] h-24 rounded-lg focus:border-brand-5 outline-none resize-none "></textarea>
            </div>
        </div>
    </div>
</template>
