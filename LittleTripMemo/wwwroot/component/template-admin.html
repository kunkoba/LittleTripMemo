<!-- 【ダイアログ子】管理者メニュー -->
<template id="tpl-menu-admin">
    <div class="w-full flex flex-col bg-brand-0">
        <button id="btn-admin-notice" class="w-full h-14 grid grid-cols-10 items-center px-4 border-b border-brand-2 hover:bg-brand-1 active:bg-brand-2 transition-colors text-black-5"><span class="col-span-1 flex justify-center text-[1.2rem]">📢</span><span class="col-span-1"></span><span class="col-span-8 text-left font-bold text-[1rem] uppercase">Notice Management</span></button>
        <button id="btn-admin-report" class="w-full h-14 grid grid-cols-10 items-center px-4 border-b border-brand-2 hover:bg-brand-1 active:bg-brand-2 transition-colors text-black-5"><span class="col-span-1 flex justify-center text-[1.2rem]">🚨</span><span class="col-span-1"></span><span class="col-span-8 text-left font-bold text-[1rem] uppercase">Report Mgmt</span></button>
        <button id="btn-admin-feedback" class="w-full h-14 grid grid-cols-10 items-center px-4 border-b border-brand-2 hover:bg-brand-1 active:bg-brand-2 transition-colors text-black-5"><span class="col-span-1 flex justify-center text-[1.2rem]">💡</span><span class="col-span-1"></span><span class="col-span-8 text-left font-bold text-[1rem] uppercase">Feedback Mgmt</span></button>
        <!-- ユーザあて通知 -->
        <button id="btn-admin-user-mail" class="w-full h-14 grid grid-cols-10 items-center px-4 border-b border-brand-2 hover:bg-brand-1 active:bg-brand-2 transition-colors text-black-5">
            <span class="col-span-1 flex justify-center text-[1.2rem]">✉️️</span><span class="col-span-1"></span><span class="col-span-8 text-left font-bold text-[1rem] uppercase">User Message Mgmt</span>
        </button>
    </div>
</template>

<!-- 【リスト子】管理者通知一覧用 -->
<template id="tpl-admin-list-child-notice">
    <div class="js-item-card flex items-stretch p-0 border border-brand-1 bg-white cursor-pointer active:scale-[0.98] transition-transform shadow-md overflow-hidden mb-3 relative">
        <div class="flex-1 min-w-0 p-3 pl-4">
            <div class="flex justify-between items-start mb-1">
                <div class="text-[0.6rem] font-black text-slate-400 tracking-wider js-date"></div>
                <span class="js-badge-status text-[9px] font-black px-2 py-0.5 uppercase tracking-wider shadow-md border"></span>
            </div>
            <div class="text-[0.8rem] font-black text-black-5 truncate pr-2 mb-1 js-title"></div>
            <div class="text-[0.7rem] text-black-3 line-clamp-1 js-body "></div>
        </div>
    </div>
</template>

<!-- 【ダイアログ子】管理者通知編集 -->
<template id="tpl-admin-notice-edit">
    <div class="w-full text-black-5 space-y-4 pt-2 px-2">
        <div>
            <label class="block text-[0.7rem] font-bold mb-1 uppercase text-black-3">Kind</label>
            <select id="edit-notice-kind" class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white"></select>
        </div>
        <div>
            <div class="flex justify-between items-end mb-1"><label class="block text-[0.7rem] font-bold uppercase text-black-3">Title</label><span class="text-[0.6rem] text-black-2 font-bold"><span id="edit-notice-title-count">0</span>/30</span></div>
            <input id="edit-notice-title" type="text" maxlength="30" class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white">
        </div>
        <div>
            <div class="flex justify-between items-end mb-1"><label class="block text-[0.7rem] font-bold uppercase text-black-3">Body</label><span class="text-[0.6rem] text-black-2 font-bold"><span id="edit-notice-body-count">0</span>/300</span></div>
            <textarea id="edit-notice-body" maxlength="300" class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] h-48 rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white resize-none"></textarea>
        </div>
        <div>
            <label class="block text-[0.7rem] font-bold mb-1 uppercase text-black-3">Link URL</label>
            <input id="edit-notice-url" type="url" class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white text-blue-500" placeholder="https://...">
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-[0.6rem] font-bold mb-1 uppercase text-black-3">Disp From</label><input id="edit-notice-from" type="date" class="w-full border-2 border-brand-3 px-2 py-1 text-[1rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white"></div>
            <div><label class="block text-[0.6rem] font-bold mb-1 uppercase text-black-3">Disp To</label><input id="edit-notice-to" type="date" class="w-full border-2 border-brand-3 px-2 py-1 text-[1rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white"></div>
        </div>
    </div>
</template>

<!-- 【リスト子】管理者フィードバック一覧用 -->
<template id="tpl-admin-list-child-feedback">
    <button class="js-item-card w-full flex flex-col p-4 rounded-[1rem] border border-brand-1 bg-white mb-3 shadow-sm">
        <div class="flex justify-between items-center mb-2"><span class="text-[0.7rem] font-black text-slate-400 tracking-wider js-date italic"></span><span class="js-score text-[0.9rem] text-yellow-500 tracking-widest leading-none drop-shadow-sm"></span></div>
        <div class="text-left text-[0.75rem] text-slate-700 break-all js-body line-clamp-1"></div>
    </button>
</template>

<!-- 【ダイアログ子】管理者フィードバック詳細 -->
<template id="tpl-admin-feedback-detail">
    <div class="w-full text-black-5 flex flex-col h-full overflow-hidden p-2 bg-white">
        <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3"><span class="text-[0.9rem] font-black text-slate-400 tracking-wider js-date italic"></span><span class="js-score text-[1.2rem] text-yellow-500 tracking-widest leading-none drop-shadow-sm"></span></div>
        <div class="mb-4 px-2"><span class="text-[0.6rem] font-black text-slate-400 uppercase tracking-widest">User ID</span><div class="text-[0.75rem] font-bold text-slate-600 js-user-id break-all mt-1"></div></div>
        <div class="flex-1 overflow-y-auto px-2 pb-4"><span class="text-[0.6rem] font-black text-slate-400 uppercase tracking-widest">Feedback Detail</span><div class="text-[1rem] text-slate-700 leading-relaxed whitespace-pre-wrap break-all js-body mt-2 h-48 overflow-y-auto pr-2"></div></div>
    </div>
</template>

<!-- 【リスト子】管理者通報集計一覧用 -->
<template id="tpl-admin-list-child-report-summary">
    <div class="relative bg-white border-b border-brand-1 p-4 flex flex-col gap-1 cursor-pointer active:bg-slate-50">
        <div class="absolute top-3 right-3 bg-red-500 text-white text-[0.7rem] font-black px-2.5 py-1 rounded-full shadow-sm"><span class="js-report-count js-badge-count">0</span></div>
        <div class="text-[0.9rem] font-black text-black-5 pr-16 truncate"><span class="js-archive-title">タイトル</span></div>
        <div class="text-[0.7rem] font-medium text-slate-400"><span class="js-target-user">0000-0000...</span></div>
    </div>
</template>

<!-- 【ダイアログ子】管理者通報詳細 -->
<template id="tpl-admin-report-detail">
    <div class="w-full text-black-5 flex flex-col h-full overflow-hidden">
        <div class="shrink-0 p-4 border-b border-brand-2 bg-slate-50 relative">
            <div class="text-[0.6rem] font-black text-slate-400 mb-1 uppercase tracking-widest">Target User</div>
            <div class="text-[0.8rem] font-black text-black-5 mb-3 js-target-user break-all"></div>
            <div class="text-[0.6rem] font-black text-slate-400 mb-1 uppercase tracking-widest">Target Archive</div>
            <div class="text-[0.8rem] font-black text-black-5 mb-4 js-archive-title break-all"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-2 bg-brand-0">
            <div class="text-[0.6rem] font-black text-slate-400 px-2 pt-2 pb-2 uppercase tracking-widest">Report Details</div>
            <div id="admin-report-detail-list" class="space-y-2 pb-4 px-1"></div>
        </div>
    </div>
</template>

<!-- 【リスト子】管理者通報詳細アイテム -->
<template id="tpl-admin-list-child-report-item">
    <div class="bg-white p-3 border border-slate-200 shadow-md relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-red-400"></div>
        <div class="pl-2">
            <div class="flex justify-between items-center mb-1"><div class="text-[0.6rem] font-bold text-slate-400 js-report-tim shrink-0"></div></div>
            <div class="text-[0.6rem] text-black-5 break-all js-report-body line-clamp-1"></div>
        </div>
    </div>
</template>

<!-- 管理者用ユーザーメール一覧アイテム -->
<template id="tpl-admin-list-child-user-mail">
    <div class="js-item-card flex items-stretch p-0 border border-brand-1 bg-white cursor-pointer active:scale-[0.98] transition-transform shadow-md overflow-hidden mb-3 relative">
        <div class="flex-1 min-w-0 p-3 pl-4">
            <div class="flex justify-between items-start mb-1">
                <div class="text-[0.8rem] font-black text-slate-400 tracking-wider js-date italic"></div>
            </div>
            <div class="absolute top-0 right-0 text-[1.5rem] font-black">
                <span class="js-emoji mr-2"></span>
            </div>
            <!-- 宛先表示をアイコン＋ニックネームに変更 -->
            <div class="w-[200px] flex items-center gap-1.5 px-2 py-0.5 rounded-full border border-slate-200 bg-slate-50 shadow-sm">
                <span class="js-target-icon text-[0.8rem]"></span>
                <span class="js-target-user text-[9px] font-black line-clamp-1 text-slate-500"></span>
            </div>
            <div class="text-[0.7rem] text-black-3 line-clamp-1 js-body mt-2"></div>
        </div>
    </div>
</template>

<!-- 【ダイアログ子】管理者：ユーザー個別通知送信 -->
<template id="tpl-admin-send-user-notification">
    <div class="w-full text-black-5 space-y-4 pt-2 px-2">
        <div class="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border border-slate-100">
            <!-- 送信アイコン選択 -->
            <button id="btn-admin-send-emoji-trigger" class="w-16 h-16 bg-white rounded-full shadow-md flex items-center justify-center text-[2.5rem] active:scale-95 transition-transform outline-none border border-slate-100">
                <span id="admin-send-emoji-preview">✉️️</span>
                <input type="hidden" id="admin-send-emoji-val" value="✉️️">
            </button>
            <div class="flex-1 min-w-0">
                <span class="text-[0.6rem] font-black text-slate-400 uppercase tracking-widest block mb-1">To User ID</span>
                <div id="admin-send-target-id" class="text-[0.7rem] font-bold text-slate-600 break-all leading-tight"></div>
            </div>
        </div>
        <div>
            <div class="flex justify-between items-end mb-1">
                <label class="block text-[0.7rem] font-bold uppercase text-slate-400">Message Body</label>
                <span class="text-[0.6rem] font-bold text-slate-300"><span id="admin-send-body-count">0</span>/300</span>
            </div>
            <textarea id="admin-send-body" maxlength="300" placeholder="ユーザーへのメッセージを入力してください" 
                class="w-full border-2 border-brand-3 px-4 py-3 text-[1rem] h-48 rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white resize-none leading-relaxed"></textarea>
        </div>
    </div>
</template>

<!-- 【ダイアログ子】管理者：通報内容の全文詳細 -->
<template id="tpl-admin-report-item-detail">
    <div class="w-full text-black-5 flex flex-col h-full overflow-hidden p-2 bg-white">
        <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
            <span class="text-[0.8rem] font-black text-slate-400 tracking-wider js-report-tim italic"></span>
        </div>
        <div class="mb-4 px-2">
            <span class="text-[0.6rem] font-black text-slate-400 uppercase tracking-widest">Reporter ID</span>
            <div class="text-[0.75rem] font-bold text-slate-600 js-reporter-id break-all mt-1"></div>
        </div>
        <div class="flex-1 overflow-y-auto px-2 pb-4">
            <span class="text-[0.6rem] font-black text-slate-400 uppercase tracking-widest">Report Body</span>
            <div class="text-[1rem] text-slate-700 leading-relaxed whitespace-pre-wrap break-all js-report-body mt-2"></div>
        </div>
    </div>
</template>
