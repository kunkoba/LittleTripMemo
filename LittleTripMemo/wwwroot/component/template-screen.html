<!-- 【ダイアログ子】設定系画面 -->
<template id="tpl-config-gps">

            <!-- 秒数表示エリア -->
            <div class="flex items-baseline gap-1 h-24">
                <span id="gps-val-display" class="text-[3.5rem] font-black text-brand-5 leading-none">0</span>

            <!-- 目盛りラベル -->
            <div class="w-full flex justify-between px-1 text-[0.6rem] font-bold text-slate-300 uppercase">
                <span>Off</span>
                <span>60s</span>
                <span>120s</span>

        </div>
    </div>
</template>
