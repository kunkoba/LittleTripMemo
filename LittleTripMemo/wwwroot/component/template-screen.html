<template id="tpl-view-profile">
	<div class="relative min-h-full flex flex-col bg-white px-1">
        <!-- 上部：ステータス情報 (No.のみ残す) -->
        <div class="flex justify-between items-center px-1">
            <div class="flex items-center gap-2">
                <span class="text-[0.8rem] font-black text-slate-600 uppercase tracking-widest">
                    No.<span id="view-profile-member-no" class="text-slate-700 text-[1rem]"></span>
                </span>
            </div>
        </div>
        <!-- アイコン・ニックネーム・バッジ -->
