<template id="tpl-share-archive">
    <div class="w-full text-black-5 flex flex-col items-center pt-6 pb-2 space-y-8">
        <div class="w-full px-4"><div id="share-archive-title" class="text-[1.2rem] font-black text-black-5 text-center break-all "></div></div>
        <div class="bg-white p-4 rounded-[1.5rem] shadow-md border border-slate-200"><img id="share-qr-image" src="" alt="QR Code" class="w-48 h-48 object-contain"></div>
        <div class="w-full"><button id="btn-share-copy" class="w-full h-14 bg-brand-5 text-white font-black rounded-[1rem] shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2 text-[0.9rem] uppercase tracking-widest"><span class="text-[1.2rem] ">📋</span> COPY SHARE URL</button></div>
    </div>
</template>

<!-- 【ダイアログ子】通知詳細 -->
<template id="tpl-view-notice">
	<div class="relative min-h-full flex flex-col bg-white px-1">
		<!-- 1. ヘッダー（日付とアイコンを横並びに） -->
        <div class="absolute -top-3 right-0 ">
            <span id="view-notice-icon" class="text-[2rem] drop-shadow-md"></span>
        </div>
		<div class="flex items-center gap-4 mb-3">
            <div class="flex items-center gap-3 text-black font-bold text-[1rem]">
                <span id="view-notice-date" class="text-slate-400 italic"></span>
			</div>
		</div>
        <!-- ユーザー情報ボタン（初期は hidden） -->
        <div id="view-notice-user-wrapper" class="hidden mb-3">
            <button id="btn-notice-user-profile" 
                class="border border-slate-100 rounded-full pl-2 pr-4 h-10 w-fit max-w-[240px] border-4 shadow-md flex items-center gap-2 active:opacity-60 transition-opacity bg-white">
                <span id="view-notice-user-icon" class="text-[1.4rem] drop-shadow-md"></span>
                <span id="view-notice-user-id" class="text-[0.8rem] text-slate-600 tracking-tight line-clamp-1 font-black"></span>
            </button>
        </div>
        <div id="view-notice-title-area" class="border-l-4 border-brand-3 pl-3 py-0.5 mb-3">
            <h1 id="view-notice-title" class="text-[1.2rem] font-black text-slate-800 break-all"></h1>
        </div>
		<!-- 3. 本文（ で統一） -->
		<div id="view-notice-body" class="text-[1rem] text-slate-600 leading-[2] whitespace-pre-wrap break-all pt-2 h-[200px] overflow-y-auto pr-2"></div>
        <!-- 4. リンク表示エリア -->
		<div id="view-notice-url-wrapper" class="hidden mt-auto flex py-1">
            <a id="view-notice-url" href="" target="_blank" 
                class="shrink-0 w-12 h-12 shadow-lg rounded-full flex items-center justify-center bg-white active:scale-95 transition-transform overflow-hidden border border-slate-50">
                <!-- ここにアイコンが挿入される -->
            </a>
        </div>
	</div>
</template>

<template id="tpl-multi-select-content">
    <div class="flex flex-col h-full w-full overflow-hidden">
        <div class="flex-1 overflow-y-auto flex flex-col min-h-0 pr-2">
            <div class="js-list-container space-y-3 pb-4 px-1 flex-1"></div>
        </div>
    </div>
</template>

<template id="tpl-multi-select-content2">
    <div class="flex flex-col h-full w-full overflow-hidden">
        <div class="flex-1 overflow-y-auto flex flex-col min-h-0">
            <div class="js-list-container pb-4 px-1 flex-1"></div>
        </div>
        <div class="shrink-0 pt-4 mt-2 border-t border-brand-2 space-y-3 bg-white pb-2 px-1">
            <div class="flex gap-3">
                <button class="js-btn-merge flex-1 h-12 bg-brand-5 text-white rounded-[1rem] font-bold text-[0.7rem] uppercase shadow-md active:scale-95 disabled:opacity-50 transition-all flex items-center justify-center gap-2"><span class="text-[1.2rem]">⇄</span> MERGE</button>
                <button class="js-btn-add flex-1 h-12 bg-brand-5 text-white rounded-[1rem] font-bold text-[0.7rem] uppercase shadow-md active:scale-95 disabled:opacity-50 transition-all flex items-center justify-center gap-2"><span class="text-[1.2rem]">＋</span> ADD</button>
            </div>
            <button class="js-btn-delete w-full h-10 bg-brand-1 text-red-400 rounded-[1rem] font-bold text-[0.6rem] uppercase active:scale-95 disabled:opacity-50 transition-all flex items-center justify-center gap-2"><span class="text-[0.8rem]">🗑</span> LOGICAL DELETE SELECTED ITEMS</button>
        </div>
    </div>
</template>
