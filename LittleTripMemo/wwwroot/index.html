<!DOCTYPE html>
<html lang="ja" data-theme="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>りとめも - Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet関連 -->
    <script src="js/leaflet/leaflet.js"></script>
    <script src="js/leaflet/leaflet.geometryutil.js"></script>
    <script src="js/leaflet/leaflet-arrowheads.js"></script>
    <link rel="stylesheet" href="css/leaflet.css">
    <!-- その他 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app-style.css">
    <link rel="stylesheet" href="css/component-style.css">
    <!-- Firebase SDK (compat版) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 1: 'var(--brand-lvl1)', 2: 'var(--brand-lvl2)', 3: 'var(--brand-lvl3)', 4: 'var(--brand-lvl4)', 5: 'var(--brand-lvl5)', } } } }
        }
    </script>
</head>

<!-- index.html の body タグ -->
<body class="overflow-hidden bg-brand-1 fixed inset-0 touch-none">

<!-- アプリ全体のルートコンテナ -->
<div id="app-root" class="mb-10">

    <!-- メインコンテンツ -->
    <div>
        <!-- ■　アプリ上部 -->
        <div id="ui-top-bar" class="absolute top-0 left-0 right-0 z-[1001]">
            <!-- ■　通知バー -->
            <div class="h-6 shadow-brand bg-brand-2 flex items-center justify-center px-3">
                <div id="notice-bar-text" class="text-[12px] font-bold "></div>
            </div>
            <!-- ■　アイコンバー -->
            <div class="mx-2 bg-transparent flex justify-between mt-2">
                <div class="flex-1 min-w-0">
                    <!-- まとめタイトル -->
                    <div class="p-0 mr-2">
                        <button id="ui-archive-title" class="hidden shadow-brand px-2 bg-brand-1 block text-[16px] font-bold truncate max-w-full">
                            RitomemoXXXXXXXXXXXXRitomemoXXXXXXXXXXXXRRitomemoXXXXXXXXXXXXR
                        </button>
                    </div>
                    <!-- 地点検索関連 -->
                    <div id="ui-sort-group" class="flex flex-col">
                        <!-- 公開／秘密 -->
                        <div id="sort-kbn" class="shadow-brand w-fit mb-2 h-8 flex border-4 border-brand-0 text-black-3">
                            <button data-value="0" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-3 ">
                                Private
                            </button>
                            <button data-value="1" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 ">
                                Publish
                            </button>
                        </div>
                        <!-- 並び順 -->
                        <div id="sort-field"  class="shadow-brand w-fit mb-2 h-8 flex border-4 border-brand-0 text-black-3">
                            <button data-value="1" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-3 ">
                                Created
                            </button>
                            <button data-value="2" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 ">
                                Updated
                            </button>
                            <button data-value="3" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 ">
                                Reaction
                            </button>
                        </div>
                        <!-- 昇順／降順 -->
                        <div id="sort-order" class="hidden shadow-brand w-fit mb-2 h-8 flex border-4 border-brand-2 text-black-3">
                            <button data-value="1" class="ui-btn h-full px-3 text-[10px] font-bold border bg-brand-0 ">
                                Asc
                            </button>
                            <button data-value="2" class="ui-btn h-full px-3 text-[10px] font-bold border bg-brand-3  border-brand-3">
                                Desc
                            </button>
                        </div>
                    </div>
                </div>
                <!-- システムメニュー -->
                <div>
                    <button id="btn-sys-menu" class="shadow-brand border-2 border-brand-4 text-[12px] w-10 h-10 bg-black text-white">
                        sys
                    </button>
                        <!-- ポップアップ -->
                        <div id="pop-sys-menu" class="hidden shadow-brand absolute top-16 right-0 w-32 bg-brand-0 border border-brand-3 shadow-xl z-[1100]">
                            <div id="sys-menu-1" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 1
                            </div>
                            <div id="sys-menu-2" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 2
                            </div>
                            <div id="sys-menu-3" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 3
                            </div>
                            <div id="sys-menu-4" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 4
                            </div>
                        </div>
                </div>
            </div>
        </div>
        <!-- ■　メイン画面：地図＋詳細パネル -->
        <div class="absolute bottom-0 flex h-screen w-screen overflow-hidden flex-col md:flex-row">
            <!-- ■　地図エリア -->
            <div id="ui-map-id" class="w-full h-full z-0"></div>
            <!-- ■　詳細パネル（右側スライド表示） -->
<!-- ■　詳細パネル（右側スライド表示） -->
            <div id="ui-detail-frame-id" class="translate-y-full flex flex-col bg-brand-0 overflow-hidden shrink-0 h-0 w-full md:h-full md:w-0 border-t md:border-t-0 md:border-l border-brand-2 transition-all duration-400 rounded-t-[2rem] md:rounded-none md:rounded-l-[2rem] shadow-2xl z-[1002]">
                
                <!-- 詳細パネルのヘッダー -->
                <div class="bg-brand-1/50 h-16 px-6 flex justify-between items-center shrink-0 border-b border-brand-1">
                    <h2 id="detail-title" class="text-xl font-black italic text-brand-5 uppercase tracking-wider">Details</h2>
                    <div class="flex gap-2">
                        <!-- ▼ ここに追加 -->
                        <button id="detail-btn-earth" class="w-8 h-8 bg-white rounded-lg shadow-sm text-black-3 flex items-center justify-center active:scale-95 text-lg">🌍</button>
                        <button id="detail-btn-map"   class="w-8 h-8 bg-white rounded-lg shadow-sm text-black-3 flex items-center justify-center active:scale-95 text-lg">🗺️</button>
                        <button id="detail-btn-edit"  class="w-8 h-8 bg-white rounded-lg shadow-sm text-black-3 flex items-center justify-center active:scale-95 text-lg">✏️</button>
                        <button id="detail-btn-close" class="w-8 h-8 bg-white rounded-lg shadow-sm text-black-3 flex items-center justify-center active:scale-95 text-lg">✕</button>
                    </div>
                </div>

                <!-- 詳細パネルの内容 (スクロールエリア) -->
                <div id="ui-detail-content-id" class="flex-1 overflow-y-auto px-4 py-6">
                    
                    <!-- ■ 参照用（表示モード） -->
                    <div id="detail-display" class="hidden space-y-4 text-black-4">
                        
                        <!-- 顔アイコン -->
                        <div class="flex flex-col items-center mb-4">
                            <div id="detail-display-face_emoji" class="text-[64px] h-16 flex items-center justify-center drop-shadow-sm"></div>
                        </div>

                        <!-- META ROW (日付・時間・天気) -->
                        <div class="relative z-10 flex mb-5 border border-slate-100 rounded-2xl overflow-hidden bg-slate-50 shadow-sm">
                            <div class="flex-1 flex flex-col items-center justify-center text-center py-2.5 px-2 border-r border-slate-200">
                                <span class="block text-[9px] font-black tracking-[0.1em] uppercase text-slate-400 mb-0.5">Date</span>
                                <span id="detail-display-memo_date" class="text-[13px] font-black text-black-5"></span>
                            </div>
                            <div class="flex-1 flex flex-col items-center justify-center text-center py-2.5 px-2 border-r border-slate-200">
                                <span class="block text-[9px] font-black tracking-[0.1em] uppercase text-slate-400 mb-0.5">Time</span>
                                <span id="detail-display-memo_time" class="text-[13px] font-black text-black-5"></span>
                            </div>
                            <!-- 参照用 (detail-display) のMETA ROW内 -->
                            <div class="flex-1 flex flex-col items-center justify-center text-center py-2.5 px-2">
                                <span class="block text-[9px] font-black tracking-[0.1em] uppercase text-slate-400 mb-0.5">Atmosphere</span>
                                <span id="detail-display-weather_emoji" class="text-[12px] font-black text-black-5 leading-tight tracking-widest"></span>
                            </div>
                        </div>

                        <!-- タイトル・本文 -->
                        <div class="bg-brand-1 rounded-2xl p-4 shadow-sm">
                            <div id="detail-display-title" class="text-[16px] font-black text-black-5 break-all mb-3 tracking-wide"></div>
                            <hr class="border-brand-2 mb-3">
                            <div id="detail-display-body" class="text-[14px] text-black-4 leading-relaxed whitespace-pre-wrap break-all min-h-[4rem]"></div>
                        </div>

                        <!-- 金額 -->
                        <div id="detail-display-price-wrapper" class="bg-brand-1 rounded-2xl p-4 shadow-sm flex justify-between items-center">
                            <span id="detail-display-price-label" class="text-[10px] font-black uppercase tracking-wider">JPY</span>
                            <span id="detail-display-memo_price" class="text-xl font-black"></span>
                        </div>

                        <!-- URL -->
                        <div id="detail-display-url-wrapper" class="bg-brand-1 rounded-2xl p-4 shadow-sm flex items-center gap-3">
                            <span class="text-brand-4 text-sm">🔗</span>
                            <a id="detail-display-link_url" href="" target="_blank" class="flex-1 text-[12px] text-blue-500 underline truncate font-bold"></a>
                        </div>

                    </div>

                    <!-- ■ 編集用（編集モード） -->
                    <form id="detail-edit" class="hidden space-y-6 text-black-4">
                        <!-- DATE & TIME -->
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block font-black text-black-3 text-[10px] mb-1 uppercase tracking-wider">DATE</label>
                                <div class="flex items-center border-b-2 border-brand-2 pb-1">
                                    <input name="memo_date" id="detail-edit-memo_date" type="date" class="w-full bg-transparent outline-none font-bold text-black-5 text-[14px]">
                                </div>
                            </div>
                            <div>
                                <label class="block font-black text-black-3 text-[10px] mb-1 uppercase tracking-wider">TIME</label>
                                <div class="flex items-center border-b-2 border-brand-2 pb-1">
                                    <input name="memo_time" id="detail-edit-memo_time" type="time" class="w-full bg-transparent outline-none font-bold text-black-5 text-[14px]">
                                </div>
                            </div>
                        </div>

                        <!-- 編集用 (detail-edit) の MOOD & ATMOSPHERE エリア -->
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block font-black text-black-3 text-[10px] mb-1 uppercase tracking-wider">MOOD</label>
                                <div class="flex items-center justify-between border-b-2 border-brand-2 pb-1">
                                    <button id="btn-face-trigger" type="button" class="w-full text-right text-2xl outline-none active:scale-95">
                                        <span id="span-face-preview"></span>
                                        <input name="face_emoji" id="detail-edit-face_emoji" type="hidden">
                                    </button>
                                </div>
                            </div>
                            <div>
                                <!-- WEATHER から ATMOSPHERE に変更、ボタンに戻す -->
                                <label class="block font-black text-black-3 text-[10px] mb-1 uppercase tracking-wider">ATMOSPHERE</label>
                                <div class="flex items-center justify-between border-b-2 border-brand-2 pb-1">
                                    <button id="btn-atmosphere-trigger" type="button" class="w-full text-right outline-none active:scale-95 font-bold text-brand-5 text-[16px] tracking-widest">
                                        <span id="span-atmosphere-preview">0000</span>
                                        <input name="weather_emoji" id="detail-edit-weather_emoji" type="hidden">
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- TITLE -->
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="font-black text-black-3 text-[10px] uppercase tracking-wider">TITLE</label>
                                <div class="text-[10px] text-black-2 font-bold"><span id="detail-count-title">0</span>/50</div>
                            </div>
                            <input name="title" id="detail-edit-title" type="text" maxlength="50" class="w-full bg-transparent border-b-2 border-brand-2 pb-1 outline-none font-black text-lg text-black-5 focus:border-brand-5">
                        </div>

                        <!-- BODY -->
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="font-black text-black-3 text-[10px] uppercase tracking-wider">MEMORY DETAIL</label>
                                <div class="text-[10px] text-black-2 font-bold"><span id="detail-count-body">0</span>/500</div>
                            </div>
                            <textarea name="body" id="detail-edit-body" maxlength="500" class="w-full bg-transparent border-b-2 border-brand-2 pb-1 outline-none text-[14px] text-black-4 focus:border-brand-5 resize-none h-24"></textarea>
                        </div>

                        <!-- PRICE -->
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block font-black text-blue-500 text-[10px] mb-1 uppercase tracking-wider">JPY</label>
                                <div class="flex items-center border-b-2 border-brand-2 pb-1">
                                    <span class="text-blue-500 font-bold mr-2 text-lg">＋</span>
                                    <input id="detail-edit-price_plus" type="number" class="w-full bg-transparent outline-none font-bold text-blue-500 text-[16px]">
                                </div>
                            </div>
                            <div>
                                <label class="block font-black text-red-500 text-[10px] mb-1 uppercase tracking-wider">JPY</label>
                                <div class="flex items-center border-b-2 border-brand-2 pb-1">
                                    <span class="text-red-500 font-bold mr-2 text-lg">－</span>
                                    <input id="detail-edit-price_minus" type="number" class="w-full bg-transparent outline-none font-bold text-red-500 text-[16px]">
                                </div>
                            </div>
                        </div>

                        <!-- URL -->
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="font-black text-black-3 text-[10px] uppercase tracking-wider">URL</label>
                                <div class="text-[10px] text-black-2 font-bold"><span id="detail-count-url">0</span>/200</div>
                            </div>
                            <div class="flex items-center border-b-2 border-brand-2 pb-1">
                                <span class="text-brand-3 mr-2 text-sm">🔗</span>
                                <input name="link_url" id="detail-edit-link_url" type="url" maxlength="200" class="w-full bg-transparent outline-none text-[12px] font-bold text-blue-500 focus:border-brand-5" placeholder="https://...">
                            </div>
                        </div>

                        <!-- 隠しフィールド -->
                        <div class="hidden">
                            <input name="archive_id" id="detail-edit-archive_id" type="hidden" value="">
                            <input name="seq" id="detail-edit-seq" type="hidden" value="">
                            <input name="latitude" id="detail-edit-latitude" type="hidden" value="">
                            <input name="longitude" id="detail-edit-longitude" type="hidden" value="">
                            <input name="memo_price" id="detail-edit-memo_price" type="hidden" value="0">
                        </div>
                    </form>
                </div>

                <!-- 詳細パネルのフッター (固定) -->
                <div class="shrink-0 px-4 pb-6 pt-4 bg-brand-0 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.03)] z-10">
                    
                    <!-- （いいねボタン） -->
                    <div id="detail-group-reaction" class="flex justify-between gap-2 mb-4">
                        <button id="detail-btn-funny" class="flex-1 bg-white rounded-2xl py-2 shadow-sm border border-brand-1 flex flex-col items-center justify-center active:scale-95 disabled:opacity-60 transition-transform">
                            <span class="text-xl">🤣</span>
                            <span class="text-[8px] font-black text-black-3 uppercase tracking-tighter mt-1">Funny</span>
                            <span class="text-[12px] font-black text-brand-5 js-count mt-0.5">0</span>
                        </button>
                        <button id="detail-btn-helpful" class="flex-1 bg-white rounded-2xl py-2 shadow-sm border border-brand-1 flex flex-col items-center justify-center active:scale-95 disabled:opacity-60 transition-transform">
                            <span class="text-xl">😍</span>
                            <span class="text-[8px] font-black text-black-3 uppercase tracking-tighter mt-1">Helpful</span>
                            <span class="text-[12px] font-black text-brand-5 js-count mt-0.5">0</span>
                        </button>
                        <button id="detail-btn-surprise" class="flex-1 bg-white rounded-2xl py-2 shadow-sm border border-brand-1 flex flex-col items-center justify-center active:scale-95 disabled:opacity-60 transition-transform">
                            <span class="text-xl">😲</span>
                            <span class="text-[8px] font-black text-black-3 uppercase tracking-tighter mt-1">Surprise</span>
                            <span class="text-[12px] font-black text-brand-5 js-count mt-0.5">0</span>
                        </button>
                        <button id="detail-btn-empathy" class="flex-1 bg-white rounded-2xl py-2 shadow-sm border border-brand-1 flex flex-col items-center justify-center active:scale-95 disabled:opacity-60 transition-transform">
                            <span class="text-xl">😉</span>
                            <span class="text-[8px] font-black text-black-3 uppercase tracking-tighter mt-1">Empathy</span>
                            <span class="text-[12px] font-black text-brand-5 js-count mt-0.5">0</span>
                        </button>
                    </div>

                    <!-- index.html 詳細パネルフッター内：マーカー移動ボタンの修正 -->
                    <div id="detail-group-move" class="flex items-center justify-center bg-black/50 rounded-full px-2 py-1 mb-4 shadow-md">
                        <button id="detail-btn-first" class="w-12 h-10 flex items-center justify-center text-white font-black text-[16px] active:scale-95 transition-transform hover:bg-white/20 rounded-full">≪</button>
                        <button id="detail-btn-prev"  class="w-12 h-10 flex items-center justify-center text-white font-black text-[16px] active:scale-95 transition-transform hover:bg-white/20 rounded-full">◀</button>
                        <div class="w-px h-6 bg-white/30 mx-4"></div>
                        <button id="detail-btn-next"  class="w-12 h-10 flex items-center justify-center text-white font-black text-[16px] active:scale-95 transition-transform hover:bg-white/20 rounded-full">▶</button>
                        <button id="detail-btn-last"  class="w-12 h-10 flex items-center justify-center text-white font-black text-[16px] active:scale-95 transition-transform hover:bg-white/20 rounded-full">≫</button>
                    </div>

                    <!-- （キャンセル・保存） -->
                    <div class="flex gap-4">
                        <button id="detail-btn-cancel" class="flex-1 bg-slate-400 text-white font-black text-[14px] h-12 rounded-2xl shadow-md uppercase active:scale-95 transition-transform">CANCEL</button>
                        <button id="detail-btn-save" class="flex-1 bg-brand-5 text-white font-black text-[14px] h-12 rounded-2xl shadow-md uppercase active:scale-95 transition-transform">SAVE DATA</button>
                    </div>
                </div>

            </div>
        </div>
        <!-- ■　アプリ下部 -->
        <div class="absolute bottom-4 left-0 right-0 z-[1001]">
            <!-- ■　アイコンバー -->
            <div id="ui-bottom-bar" class="mx-2 bg-transparent flex items-end justify-between mb-3">
                <!-- 左 -->
                <div>
                    <div class="w-10"></div>
                </div>
                <!-- 中央 -->
                <div>
                    <!-- 新規登録ボタン -->
                    <button id="btn-create" class="shadow-brand w-16 h-16 bg-brand-5 text-white font-black text-[12px]">
                        create
                    </button>
                    <!-- index.html の下部バー内：ボトム移動ボタン群の修正 -->
                    <div id="bot-group-move" class="hidden flex items-center bg-black/70 rounded-full px-2 py-1 shadow-md">
                        <button id="btn-bot-move-first" class="w-10 h-10 flex items-center justify-center text-white font-black text-[16px] active:scale-95 transition-transform hover:bg-white/20 rounded-full">≪</button>
                        <button id="btn-bot-move-prev"  class="w-10 h-10 flex items-center justify-center text-white font-black text-[16px] active:scale-95 transition-transform hover:bg-white/20 rounded-full">◀</button>
                        <div class="w-px h-5 bg-white/30 mx-1"></div>
                        <button id="btn-bot-move-open"  class="w-10 h-10 flex items-center justify-center text-brand-5 font-black text-[20px] active:scale-95 transition-transform hover:bg-white/20 rounded-full drop-shadow-md">●</button>
                        <div class="w-px h-5 bg-white/30 mx-1"></div>
                        <button id="btn-bot-move-next"  class="w-10 h-10 flex items-center justify-center text-white font-black text-[16px] active:scale-95 transition-transform hover:bg-white/20 rounded-full">▶</button>
                        <button id="btn-bot-move-last"  class="w-10 h-10 flex items-center justify-center text-white font-black text-[16px] active:scale-95 transition-transform hover:bg-white/20 rounded-full">≫</button>
                    </div>
                    <!-- 地点検索ボタン -->
                    <button id="btn-search" class="hidden shadow-brand w-16 h-16 bg-brand-5 text-white font-black text-[12px]">
                        Search
                    </button>
                </div>
                <!-- 右 -->
                <div>
                    <!-- アプリメニュー -->
                    <button id="btn-app-menu" class="shadow-brand bg-brand-1 text-brand-5 w-10 h-10 border-2 border-brand-4 text-[12px] font-bold">
                        app
                    </button>
                        <!-- ポップアップ -->
                        <div id="pop-app-menu" class="hidden shadow-brand absolute bottom-12 right-0 w-32 bg-brand-0 border border-brand-3 shadow-xl z-[1100]">
                            <div id="app-menu-1" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 1
                            </div>
                            <div id="app-menu-2" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 2
                            </div>
                            <div id="app-menu-3" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 3
                            </div>
                            <div id="app-menu-4" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 4
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>

    <!-- その他 -->
    <div>
        <!-- ■　ダイアログ -->
        <div id="ui-dialog-root">
            <!-- ダイアログ生成物 -->
        </div>
        <!-- ■　テンプレート -->
        <div id="ui-template-root">
            <!-- テンプレート生成物 -->
        </div>
        <!-- ■　共通バックドロップ -->
        <div id="ui-dialog-backdrop" class="z-[1999] fixed inset-0 hidden backdrop-blur-[4px] "></div>

        <!-- ■　Toast を積み上げるコンテナ -->
        <div id="toast-container" class="fixed bottom-20 left-1/2 -translate-x-1/2 flex flex-col gap-2 z-[9999]"></div>
