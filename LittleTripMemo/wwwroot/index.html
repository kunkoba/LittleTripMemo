<!DOCTYPE html>
<html lang="ja" data-theme="blue" class="text-[14px] md:text-[16px]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>りとめも - Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet関連 -->
    <script src="js/leaflet/leaflet.js"></script>
    <script src="js/leaflet/leaflet.geometryutil.js"></script>
    <script src="js/leaflet/leaflet-arrowheads.js"></script>
    <link rel="stylesheet" href="css/leaflet.css">
    <!-- その他 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app-style.css">
    <link rel="stylesheet" href="css/component-style.css">
    <!-- Firebase SDK (compat版) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <!-- Emoji Mart v5 (React なしで使える UMD 版) -->
    <script src="https://unpkg.com/emoji-mart@5.6.0/dist/browser.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            1: 'var(--brand-lvl1)',
                            2: 'var(--brand-lvl2)',
                            3: 'var(--brand-lvl3)',
                            4: 'var(--brand-lvl4)',
                            5: 'var(--brand-lvl5)',
                        }
                    }
                }
            },
        }
    </script>
</head>

<!-- index.html の body タグ -->
<body class="overflow-hidden bg-brand-1 fixed inset-0 touch-none flex">

<!-- ★PC用広告サイドバー（左側に固定） -->
<div id="ad-space-pc" class="hidden lg:flex w-[250px] shrink-0 bg-slate-50 border-r border-brand-2 z-[2000] flex-col items-center justify-center shadow-md relative gap-8">
    <!-- 広告1 -->
    <div class="flex flex-col items-center">
        <div class="text-slate-400 text-[0.6rem] font-black tracking-widest uppercase mb-2">Advertisement</div>
        <div class="w-[200px] h-[250px] bg-slate-200 border border-slate-300 flex items-center justify-center text-slate-400 text-[0.8rem] font-bold shadow-inner">
            AD BANNER 1
        </div>
    </div>
    <!-- 広告2 -->
    <div class="flex flex-col items-center">
        <div class="text-slate-400 text-[0.6rem] font-black tracking-widest uppercase mb-2">Advertisement</div>
        <div class="w-[200px] h-[250px] bg-slate-200 border border-slate-300 flex items-center justify-center text-slate-400 text-[0.8rem] font-bold shadow-inner">
            AD BANNER 2
        </div>
    </div>

</div>

<!-- アプリ全体のルートコンテナ（flex-1 で残り幅を使い、min-w-0ではみ出しを防ぐ） -->
<div id="app-root" class="flex-1 relative h-full min-w-0">

    <!-- メインコンテンツ（親領域の枠にピッタリはめ込む） -->
    <div class="absolute inset-0">
        <!-- ■　アプリ上部 -->
        <div id="ui-top-bar" class="absolute top-0 left-0 right-0 z-[1000] pointer-events-none">
            <!-- ■　通知バー -->
            <div class="h-6 shadow-brand_ bg-black/20 flex items-center justify-center">
                <div id="notice-bar-text" class="text-[0.7rem] font-bold text-white"></div>
            </div>
            <!-- ■　アイコンバー -->
            <div class="mx-2 bg-transparent flex justify-center mt-2">
                <!-- タイトルバー -->
                <div class="flex-1 min-w-0 w-10">
                    <!-- まとめタイトル -->
                    <div class="p-0 flex justify-center">
                        <!-- 初期状態を黒背景にし、内部にアイコンとテキストの要素を分割 -->
                        <button id="ui-archive-title" class="hidden py-1 px-6 flex items-center gap-2 bg-slate-800/50 rounded-full 
                            text-white text-[0.8rem] font-bold shadow-brand max-w-full transition-colors pointer-events-auto">
                            <span class="js-icon text-[1rem] shrink-0 drop-shadow-md">🔒</span>
                            <span class="js-text truncate  pt-0.5">タイトル</span>
                        </button>
                    </div>
                    <!-- 地点検索関連 -->
                    <div id="ui-sort-group" class="hidden flex flex-col items-center ">
                        <!-- Public／Private -->
                        <div id="sort-kbn" class="shadow-brand w-fit mb-2 h-8 flex text-black-0 rounded-full overflow-hidden pointer-events-auto">
                            <button data-value="0" class="ui-btn h-full px-4 text-[12px] font-bold bg-brand-3 transition-colors">
                                Private
                            </button>
                            <button data-value="1" class="ui-btn h-full px-4 text-[12px] font-bold bg-brand-0 transition-colors">
                                Publish
                            </button>
                        </div>
                        <!-- 並び順 -->
                        <div id="sort-field" class="shadow-brand w-fit mb-2 h-8 flex text-black-0 rounded-full overflow-hidden pointer-events-auto">
                            <button data-value="1" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-3 transition-colors">
                                Created
                            </button>
                            <button data-value="2" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 transition-colors">
                                Updated
                            </button>
                            <button data-value="3" class="hidden ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 transition-colors">
                                Reaction
                            </button>
                            <!-- ▼ ここに「Word」を追加 -->
                            <button data-value="4" class="hidden ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 transition-colors">
                                Word
                            </button>
                        </div>
                        <!-- リアクション種別 -->
                        <div id="sort-reaction" class="hidden shadow-brand w-fit mb-2 h-10 flex text-black-0 text-[1.5rem] rounded-full overflow-hidden pointer-events-auto">
                            <button data-value="1" class="ui-btn h-full px-3 bg-brand-3 transition-colors">🤣</button>
                            <button data-value="2" class="ui-btn h-full px-3 bg-brand-0 transition-colors">😍</button>
                            <button data-value="3" class="ui-btn h-full px-3 bg-brand-0 transition-colors">😲</button>
                            <button data-value="4" class="ui-btn h-full px-3 bg-brand-0 transition-colors">😉</button>
                        </div>
                        <!-- 検索キーワード入力欄 -->
                        <div id="sort-word" class="hidden shadow-brand w-fit mb-2 h-8 flex text-black-0 rounded-full overflow-hidden bg-white pointer-events-auto">
                            <input type="text" id="input-sort-word" class="h-full px-3 text-[1rem] text-black-5 outline-none bg-transparent w-40 placeholder-slate-300" placeholder="Keyword...">
                        </div>
                    </div>
                    <!-- ★スマホ用広告スペース（PCでは非表示） -->
                    <div id="ad-space-mobile" class="lg:hidden mt-6 mx-auto max-w-[320px] h-[50px] pointer-events-auto">
                        <div class="bg-white backdrop-blur-sm w-full h-full border border-brand-2 shadow-brand flex items-center justify-center text-slate-400 text-[0.6rem] font-black tracking-widest pointer-events-auto">
                            ADD SPACE
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <!-- ■　メイン画面：地図＋詳細パネル -->
        <div class="absolute bottom-0 flex h-full w-full overflow-hidden flex-col md:flex-row">
            <!-- ■　地図エリア -->
            <div id="ui-map-id" class="w-full h-full z-0">
                <!-- 明細閉じる用パネル -->
                <div id="ui-map-barrier" class="fixed inset-0 z-[750] hidden bg-transparent"></div>
            </div>
            <!-- ■　詳細パネル（右側スライド表示） -->
            <div id="ui-detail-frame-id" class="translate-y-full flex flex-col bg-brand-0 overflow-hidden shrink-0 h-0 w-full 
                md:h-full md:w-0 transition-all duration-400 shadow-2xl z-[1002]">
                <!-- 詳細パネルのヘッダー -->
                <div class="bg-brand-5 h-14 px-6 flex justify-between items-center shrink-0 border-2 border-brand-5 z-[1000] shadow-md">
                    <h2 id="detail-title" class="text-[1.2rem] font-black italic text-brand-0 uppercase tracking-wider">Details</h2>
                    <div class="flex gap-2">
                        <button id="detail-btn-current" class="w-9 h-9 bg-white rounded-full shadow-md text-black-3 flex items-center justify-center active:scale-95 text-[1.2rem]">
                            📍
                        </button>
                        <button id="detail-btn-earth" class="w-9 h-9 bg-white rounded-full shadow-md text-black-3 flex items-center justify-center active:scale-95 text-[1.2rem]">
                            🌍
                        </button>
                        <button id="detail-btn-map"   class="w-9 h-9 bg-white rounded-full shadow-md text-black-3 flex items-center justify-center active:scale-95 text-[1.2rem]">
                            🗺️
                        </button>
                        <button id="detail-btn-report" class="hidden w-9 h-9 bg-white rounded-full shadow-sm text-black-3 flex items-center justify-center active:scale-95 text-[1.2rem]">
                            🚫
                        </button>
                        <button id="detail-btn-edit"  class="w-9 h-9 bg-white rounded-full shadow-md text-black-3 flex items-center justify-center active:scale-95 text-[1.2rem]">
                            ✏️
                        </button>
                        <button id="detail-btn-close" class="w-9 h-9 bg-white rounded-full shadow-md text-black-3 flex items-center justify-center active:scale-95 text-[1.2rem]">
                            ✖
                        </button>
                    </div>
                </div>
                <!-- 詳細パネルの内容 (スクロールエリア) -->
                <div id="ui-detail-content-id" class="flex-1 overflow-y-auto p-6">
                    <!-- ■ 参照用（表示モード）：縦並び・左揃え・1rem 統一版 -->
                    <div id="detail-display" class="hidden relative min-h-full flex flex-col bg-white">
                        <!-- 右上の正円インデックスバッジ -->
                        <div class="js-index-badge absolute -top-3 -right-3 w-10 h-10 rounded-full bg-brand-4 text-white font-black text-[1.2rem] flex items-center justify-center shadow-md z-20">
                        </div>
                        <!-- 背景用の巨大顔文字：上部に固定（スクロールしても動かない） -->
                        <div class="sticky top-0 w-full h-0 pointer-events-none z-0 flex justify-center">
                            <div id="detail-display-face_emoji_bg" class="text-[12rem] opacity-[0.1]  select-none -translate-y-4 mt-36"></div>
                        </div>
                        <!-- メインコンテンツ：ここを縦並び・左揃えに設定 -->
                        <div class="relative z-10 flex flex-col items-start gap-4">
                            <!-- 1. 日付・時刻・顔文字を横並びに -->
                            <div class="gap-4 w-fit">
                                <div class="flex items-center gap-3 text-black font-bold text-[1.2rem] text-slate-500 italic">
                                    <div>
                                        <span id="detail-display-memo_date" class="mr-2"></span>
                                        <span id="detail-display-memo_time" ></span>
                                    </div>
                                    <!-- 顔文字（1rem） -->
                                    <span id="detail-display-face_emoji" class="text-[1.5rem] hidden"></span>
                                </div>
                            </div>
                            <!-- 4. タイトル（左揃え・1rem・左アクセント） -->
                            <div class="border-l-4 border-brand-3 pl-3 py-0.5 mt-2">
                                <h1 id="detail-display-title" class="text-[1.2rem] font-black text-slate-800  break-all"></h1>
                            </div>
                            <!-- 2. 金額（左揃え・1rem） -->
                            <div id="detail-display-price-wrapper" class="hidden pl-3 flex items-baseline italic">
                                <span id="detail-display-memo_price" class="text-[1.2rem] font-black italic "></span>
                                <span id="detail-display-price-unit" class="text-[0.7rem] font-bold text-slate-400 ml-1.5 uppercase"></span>
                            </div>
                            <!-- 5. 本文（左揃え・1rem以下） -->
                            <div id="detail-display-body" class="text-[1rem] text-slate-600 whitespace-pre-wrap break-all leading-[2]"></div>
                            <!-- 隠し項目 -->
                            <span id="detail-display-weather_code" class="hidden"></span>
                            <!-- 下部：Locationカード風のURLリンク -->
                            <div id="detail-display-url-wrapper" class="hidden w-full">
                                <a id="detail-display-link_url" href="" target="_blank" 
                                    class="shrink-0 w-12 h-12 shadow-md rounded-full flex items-center justify-center bg-white active:scale-95 transition-transform overflow-hidden border border-slate-50">
                                    <!-- ここに $Util.GetUrlIconHtml が挿入される -->
                                </a>
                            </div>
                        </div>
                    </div>
                    <!-- ■ 編集用（編集モード） -->
                    <form id="detail-edit" class="hidden space-y-6 text-black-4">
                        <!-- DATE & TIME -->
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block font-black text-black-3 text-[0.6rem] mb-1 uppercase tracking-wider">DATE</label>
                                <div class="flex items-center border-b-2 border-brand-2 pb-1">
                                    <input name="memo_date" id="detail-edit-memo_date" type="date" class="w-full bg-transparent outline-none font-bold text-black-5 text-[1rem]">
                                </div>
                            </div>
                            <div>
                                <label class="block font-black text-black-3 text-[0.6rem] mb-1 uppercase tracking-wider">TIME</label>
                                <div class="flex items-center border-b-2 border-brand-2 pb-1">
                                    <input name="memo_time" id="detail-edit-memo_time" type="time" class="w-full bg-transparent outline-none font-bold text-black-5 text-[1rem]">
                                </div>
                            </div>
                        </div>
                        <!-- 編集用 (detail-edit) の MARKER & ATMOSPHERE エリア -->
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block font-black text-black-3 text-[0.6rem] mb-1 uppercase tracking-wider">MARKER</label>
                                <div class="flex items-center justify-between border-b-2 border-brand-2 pb-1">
                                    <!-- 地点名取得 -->
                                    <button id="btn-face-trigger" type="button" class="h-[30px] w-full text-right text-[1.5rem] outline-none active:scale-95">
                                        <span id="span-face-preview"></span>
                                        <input name="face_emoji" id="detail-edit-face_emoji" type="hidden">
                                    </button>
                                </div>
                            </div>
                            <div>
                                <!-- WEATHER から ATMOSPHERE に変更、ボタンに戻す -->
                                <label class="block font-black text-black-3 text-[0.6rem] mb-1 uppercase tracking-wider">ATMOSPHERE</label>
                                <div class="flex items-center justify-between border-b-2 border-brand-2 pb-1">
                                    <button id="btn-atmosphere-trigger" type="button" class="h-[30px] w-full text-right outline-none active:scale-95 font-bold text-brand-5 text-[1rem] tracking-widest">
                                        <span id="span-atmosphere-preview">0000</span>
                                        <input name="weather_code" id="detail-edit-weather_code" type="hidden">
                                    </button>
                                </div>
                            </div>
                        </div>
                        <!-- TITLE -->
                        <div class="w-full">
                            <!-- 全体：左（タイトル＋カウント＋入力欄）＋右（ボタン） -->
                            <div class="flex items-end gap-2">
                                <!-- 左側：タイトル行＋カウント行＋入力欄（セット） -->
                                <div class="flex-1">
                                    <!-- タイトルとカウントを1行で、幅は入力欄と同じ -->
                                    <div class="flex justify-between items-center mb-1">
                                        <label class="font-black text-black-3 text-[0.6rem] uppercase tracking-wider">
                                            TITLE
                                        </label>
                                        <div class="text-[0.6rem] text-black-2 font-bold">
                                            <span id="detail-count-title">0</span>/30
                                        </div>
                                    </div>

                                    <!-- 入力欄（上の行と右端が揃う） -->
                                    <input
                                        name="title"
                                        id="detail-edit-title"
                                        type="text"
                                        maxlength="30"
                                        class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white"
                                    >
                                </div>
                                <!-- 右側：固定サイズボタン -->
                                <button id="btn-address-name" type="button"
                                    class="w-10 h-10 rounded-[1rem] pb-3 bg-white flex items-center justify-center text-[24px] outline-none active:scale-95">
                                    👇
                                </button>
                            </div>
                        </div>
                        <!-- BODY -->
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="font-black text-black-3 text-[0.6rem] uppercase tracking-wider">MEMORY DETAIL</label>
                                <div class="text-[0.6rem] text-black-2 font-bold"><span id="detail-count-body">0</span>/300</div>
                            </div>
                            <textarea name="body" id="detail-edit-body" maxlength="300" 
                                class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] h-48 rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white resize-none"></textarea>
                        </div>
                        <!-- PRICE -->
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="font-black text-black-3 text-[0.6rem] uppercase tracking-wider">PRICE</label>
                            </div>
                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <div class="flex items-center border-brand-2 pb-1">
                                        <span class="text-blue-500 font-bold mr-2 text-[1.2rem]">＋</span>
                                        <input id="detail-edit-price_plus" type="number" 
                                            class="w-full border-2 border-brand-3 px-3 py-1 text-[1.2rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white resize-none">
                                    </div>
                                </div>
                                <div>
                                    <div class="flex items-center border-brand-2 pb-1">
                                        <span class="text-red-500 font-bold mr-2 text-[1.2rem]">－</span>
                                        <input id="detail-edit-price_minus" type="number" 
                                            class="w-full border-2 border-brand-3 px-3 py-1 text-[1.2rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white resize-none">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- URL -->
                        <div>
                            <div class="flex justify-between items-end mb-1">
                                <label class="font-black text-black-3 text-[0.6rem] uppercase tracking-wider">URL</label>
                                <div class="text-[0.6rem] text-black-2 font-bold"><span id="detail-count-url">0</span>/200</div>
                            </div>
                            <div class="flex items-center border-brand-2 pb-1">
                                <input name="link_url" id="detail-edit-link_url" type="url" maxlength="200" 
                                    class="w-full border-2 border-brand-3 px-3 py-2 text-[1rem] rounded-[1rem] focus:outline-none focus:border-brand-5 bg-white resize-none" placeholder="https://...">
                            </div>
                        </div>
                        <!-- 隠しフィールド -->
                        <div class="hidden">
                            <input name="archive_id" id="detail-edit-archive_id" type="hidden" value="">
                            <input name="seq" id="detail-edit-seq" type="hidden" value="">
                            <input name="latitude" id="detail-edit-latitude" type="hidden" value="">
                            <input name="longitude" id="detail-edit-longitude" type="hidden" value="">
                            <input name="memo_price" id="detail-edit-memo_price" type="hidden" value="0">
                        </div>
                    </form>
                </div>

                <!-- 詳細パネルのフッター (固定) -->
                <div class="shrink-0 px-4 pb-6 pt-4 bg-slate-50 border z-10">
                    <!-- （いいねボタン） -->
                    <div id="detail-group-reaction" class="flex justify-between gap-2 mb-4">
                        <button id="detail-btn-funny"    class="flex-1 bg-white rounded-[1rem] py-2 shadow-md border border-brand-1 items-center justify-center active:scale-95 disabled:opacity-60 transition-transform">
                            <span class="text-[2rem]">🤣</span>
                            <span class="text-[0.7rem] font-black text-brand-5 js-count mt-0.5">0</span>
                        </button>
                        <button id="detail-btn-helpful"  class="flex-1 bg-white rounded-[1rem] py-2 shadow-md border border-brand-1 items-center justify-center active:scale-95 disabled:opacity-60 transition-transform">
                            <span class="text-[2rem]">😍</span>
                            <span class="text-[0.7rem] font-black text-brand-5 js-count mt-0.5">0</span>
                        </button>
                        <button id="detail-btn-surprise" class="flex-1 bg-white rounded-[1rem] py-2 shadow-md border border-brand-1 items-center justify-center active:scale-95 disabled:opacity-60 transition-transform">
                            <span class="text-[2rem]">😲</span>
                            <span class="text-[0.7rem] font-black text-brand-5 js-count mt-0.5">0</span>
                        </button>
                        <button id="detail-btn-sad"      class="flex-1 bg-white rounded-[1rem] py-2 shadow-md border border-brand-1 items-center justify-center active:scale-95 disabled:opacity-60 transition-transform">
                            <span class="text-[2rem]">😭</span>
                            <span class="text-[0.7rem] font-black text-brand-5 js-count mt-0.5">0</span>
                        </button>
                    </div>
                    <!-- index.html 詳細パネルフッター内：マーカー移動ボタンの修正 -->
                    <div id="detail-group-move" class="flex items-center justify-center bg-black/70 rounded-full px-2 py-1 mb-4 shadow-md">
                        <button id="detail-btn-first" class="w-12 h-10 flex items-center justify-center text-white font-black text-[1rem] active:scale-95 transition-transform hover:bg-white/20 rounded-full">≪</button>
                        <button id="detail-btn-prev"  class="w-12 h-10 flex items-center justify-center text-white font-black text-[1rem] active:scale-95 transition-transform hover:bg-white/20 rounded-full">◀</button>
                        <div class="w-px h-6 bg-white/30 mx-4"></div>
                        <button id="detail-btn-next"  class="w-12 h-10 flex items-center justify-center text-white font-black text-[1rem] active:scale-95 transition-transform hover:bg-white/20 rounded-full">▶</button>
                        <button id="detail-btn-last"  class="w-12 h-10 flex items-center justify-center text-white font-black text-[1rem] active:scale-95 transition-transform hover:bg-white/20 rounded-full">≫</button>
                    </div>
                    <!-- （キャンセル・保存） -->
                    <div class="flex gap-4">
                        <button id="detail-btn-cancel" class="flex-1 bg-slate-400 text-white font-black text-[1rem] h-12 rounded-[1rem] shadow-md uppercase active:scale-95 transition-transform">CANCEL</button>
                        <button id="detail-btn-save"   class="flex-1 bg-brand-5   text-white font-black text-[1rem] h-12 rounded-[1rem] shadow-md uppercase active:scale-95 transition-transform">SAVE DATA</button>
                    </div>
                </div>

            </div>
        </div>
        <!-- ■　アプリ下部 -->
        <div class="absolute bottom-4 left-0 right-0 z-[1001] pointer-events-none">
            <!-- ★追加: スマホ用広告スペース（下段） -->
            <div id="ad-space-mobile-bottom" class="lg:hidden mx-auto mb-4 w-[320px] h-[50px] pointer-events-auto shadow-md">
                <div class="bg-white w-full h-full border border-brand-2 flex items-center justify-center text-slate-400 text-[0.6rem] font-black tracking-widest rounded-sm">
                    AD BANNER BOTTOM
                </div>
            </div>
            <!-- ■　アイコンバー -->
            <div id="ui-bottom-bar" class="mx-2 bg-transparent flex items-center justify-between mb-3">

                <div>

                    <button id="btn-sys-menu" class="relative rounded-full shadow-brand border-2 border-brand-4 text-[1.2rem] w-10 h-10 bg-black text-white pointer-events-auto">

                        <!-- バッジをあらかじめ仕込んでおく（初期は hidden） -->
                        <span id="badge-sys-menu" class="hidden absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full pointer-events-none"></span>
                    </button>
                </div>
                <!-- 中央 -->
                <div>
                    <!-- 新規登録ボタン -->
                    <button id="btn-create" class="rounded-full shadow-brand w-16 h-16 border-2 border-brand-5 bg-white text-white font-black text-[24px] pointer-events-auto">

                        <button id="btn-bot-move-prev"  class="w-10 h-10 flex items-center justify-center text-white font-black text-[1rem] active:scale-95 transition-transform hover:bg-white/20 rounded-full">◀</button>
                        <div class="w-px h-5 bg-white/30 mx-1"></div>
                        <button id="btn-bot-move-open"  class="w-10 h-10 flex items-center justify-center text-brand-5 font-black text-[1.2rem] active:scale-95 transition-transform hover:bg-white/20 rounded-full drop-shadow-md">●</button>
                        <div class="w-px h-5 bg-white/30 mx-1"></div>
                        <button id="btn-bot-move-next"  class="w-10 h-10 flex items-center justify-center text-white font-black text-[1rem] active:scale-95 transition-transform hover:bg-white/20 rounded-full">▶</button>
                        <button id="btn-bot-move-last"  class="w-10 h-10 flex items-center justify-center text-white font-black text-[1rem] active:scale-95 transition-transform hover:bg-white/20 rounded-full">≫</button>
                    </div>
                </div>
                <!-- 右 -->
                <div>
                    <!-- アプリメニュー -->

                </div>
            </div>

        <!-- ■　テンプレート -->

        <div id="ui-dialog-backdrop" class="z-[1999] absolute inset-0 hidden"></div>

        <!-- ■　Toast を積み上げるコンテナ -->
        <div id="toast-container" class="absolute bottom-[100px] w-full flex flex-col gap-3 z-[9999] pointer-events-none"></div>

        <!-- ヘルプメッセージ -->
        <div id="ui-help-dialog" onclick="if(event.target === this) this.classList.add('hidden')"
            class="fixed inset-0 z-[3000] hidden flex items-center justify-center bg-slate-900/60 backdrop-blur-sm">
            <div class="w-[92%] max-w-[480px] bg-white rounded-xl shadow-xl flex flex-col overflow-hidden border border-slate-300">
                <!-- ヘッダー -->
                <div class="h-12 flex items-center justify-between px-4 bg-slate-800 text-white">
                    <span class="font-semibold text-[0.9rem] tracking-wide">
                        Help Guide
                    </span>
                    <button onclick="document.getElementById('ui-help-dialog').classList.add('hidden')" 
                        class="w-8 h-8 flex items-center justify-center rounded-md bg-slate-700 hover:bg-slate-600 active:scale-95 text-[0.75rem]">
                        ✖
                    </button>
                </div>
                <!-- 本文（流し込み前提） -->
                <div id="ui-help-dialog-body"
                    class="p-5 text-[0.85rem] text-slate-700  whitespace-pre-wrap max-h-[65vh] overflow-y-auto bg-slate-50">
                </div>
            </div>
        </div>

        <!-- 【マップ】ポップアップ -->
        <template id="tpl-marker-popup">
            <div class="relative w-full bg-white rounded-[1rem] shadow-md p-4 pt-5 overflow-hidden flex flex-col">
                <!-- 右上の正円インデックスバッジ（枠外にはみ出させる） -->
                <div class="absolute top-1 right-1 w-10 h-10 rounded-full bg-brand-4 text-white font-black text-[1.2rem] flex items-center justify-center shadow-md border-2 border-white z-20">
                    <span class="index"></span>
                </div>
                <!-- 日時 -->
                <div class="text-[0.8rem] mb-1.5 tracking-widest font-black text-slate-400 italic">
                    <span class="time"></span>
                </div>
                <!-- タイトル -->
                <div class="text-[0.8rem] border-l-4 border-brand-3 pl-3 font-black text-black-5  mb-2 line-clamp-2 pr-8 relative z-10">
                    <span class="title"></span>
                </div>
                <!-- 本文 -->
                <div class="text-[0.7rem] text-black-3 line-clamp-3 leading-[2] overflow-y-auto pr-2">
                    <span class="body"></span>
                </div>
                <!-- アクションボタン -->
                <button id="btn-popup-action" 
                    class="mt-3 w-full h-10 bg-brand-2 text-brand-5 font-black text-[0.7rem] border-y-2 border-brand-3 flex items-center justify-center gap-1 uppercase active:scale-95 transition-transform tracking-widest">
                    <span class="js-action-text px-4 truncate"></span>
                    <!-- <span class="text-[0.8rem]  mb-0.5">›</span> -->
                </button>
            </div>
        </template>

        <!-- ローディング用 -->
        <template id="tpl-loading">
            <div class="
                fixed inset-0 bg-black/40 flex items-center justify-center
                opacity-0 pointer-events-none transition-all duration-300
                z-[9998]
            ">
                <div class="text-[1.8rem] font-bold text-white inline-block wait-dots">
                    Wait
                </div>
            </div>
        </template>

    </div>

</div>
