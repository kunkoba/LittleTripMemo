<!DOCTYPE html>
<html lang="ja" data-theme="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>りとめも - Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet関連 -->
    <script src="js/leaflet/leaflet.js"></script>
    <script src="js/leaflet/leaflet.geometryutil.js"></script>
    <script src="js/leaflet/leaflet-arrowheads.js"></script>
    <link rel="stylesheet" href="css/leaflet.css">
    <!-- その他 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app-style.css">
    <link rel="stylesheet" href="css/component-style.css">
    <!-- Firebase SDK (compat版) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 1: 'var(--brand-lvl1)', 2: 'var(--brand-lvl2)', 3: 'var(--brand-lvl3)', 4: 'var(--brand-lvl4)', 5: 'var(--brand-lvl5)', } } } }
        }
    </script>
</head>

<!-- index.html の body タグ -->
<body class="overflow-hidden bg-brand-1 fixed inset-0 touch-none">

<!-- アプリ全体のルートコンテナ -->
<div id="app-root" class="mb-10">

    <!-- （テスト用）ボタン -->
    <div class="absolute top-40 left-0 z-[1001] h-screen flex items-start pointer-events-none">
        <button id="btn-test" class="shadow-brand pointer-events-auto bg-white/70 p-2 shadow-md border border-black-2">
            テスト
        </button>
    </div>

    <!-- メインコンテンツ -->
    <div>
        <!-- ■　アプリ上部 -->
        <div id="ui-top-bar" class="absolute top-0 left-0 right-0 z-[1001]">
            <!-- ■　通知バー -->
            <div class="h-6 shadow-brand bg-brand-2 flex items-center justify-center px-3">
                <div id="notice-bar-text" class="text-[12px] font-bold "></div>
            </div>
            <!-- ■　アイコンバー -->
            <div class="mx-2 bg-transparent flex justify-between mt-2">
                <div class="flex-1 min-w-0">
                    <!-- まとめタイトル -->
                    <div class="p-0 mr-2">
                        <button id="ui-archive-title" class="hidden shadow-brand px-2 bg-brand-1 block text-[16px] font-bold truncate max-w-full">
                            RitomemoXXXXXXXXXXXXRitomemoXXXXXXXXXXXXRRitomemoXXXXXXXXXXXXR
                        </button>
                    </div>
                    <!-- 地点検索関連 -->
                    <div id="ui-sort-group" class="flex flex-col">
                        <!-- 公開／非公開 -->
                        <div id="sort-kbn" class="shadow-brand w-fit mb-2 h-8 flex border-4 border-brand-0 text-black-3">
                            <button data-value="0" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 ">
                                Private
                            </button>
                            <button data-value="1" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-3">
                                Publish
                            </button>
                        </div>
                        <!-- 並び順 -->
                        <div id="sort-field"  class="shadow-brand w-fit mb-2 h-8 flex border-4 border-brand-0 text-black-3">
                            <button data-value="1" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 ">
                                New
                            </button>
                            <button data-value="2" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-0 ">
                                Update
                            </button>
                            <button data-value="3" class="ui-btn h-full px-3 text-[12px] font-bold bg-brand-3 ">
                                Rating
                            </button>
                        </div>
                        <!-- 昇順／降順 -->
                        <div id="sort-order" class="hidden shadow-brand w-fit mb-2 h-8 flex border-4 border-brand-2 text-black-3">
                            <button data-value="1" class="ui-btn h-full px-3 text-[10px] font-bold border bg-brand-0 ">
                                Asc
                            </button>
                            <button data-value="2" class="ui-btn h-full px-3 text-[10px] font-bold border bg-brand-3  border-brand-3">
                                Desc
                            </button>
                        </div>
                    </div>
                </div>
                <!-- システムメニュー -->
                <div>
                    <button id="btn-sys-menu" class="shadow-brand text-[12px] w-10 h-10 bg-black text-white">
                        sys
                    </button>
                        <!-- ポップアップ -->
                        <div id="pop-sys-menu" class="hidden shadow-brand absolute top-16 right-0 w-32 bg-brand-0 border border-brand-3 shadow-xl z-[1100]">
                            <div id="sys-menu-1" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 1
                            </div>
                            <div id="sys-menu-2" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 2
                            </div>
                            <div id="sys-menu-3" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 3
                            </div>
                            <div id="sys-menu-4" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 4
                            </div>
                        </div>
                </div>
            </div>
        </div>
        <!-- ■　メイン画面：地図＋詳細パネル -->
        <div class="absolute bottom-0 flex h-screen w-screen overflow-hidden flex-col md:flex-row">
            <!-- ■　地図エリア -->
            <div id="ui-map-id" class="w-full h-full z-0"></div>
            <!-- ■　詳細パネル（右側スライド表示） -->
            <div id="ui-detail-frame-id" class="translate-y-full flex flex-col bg-brand-1 overflow-hidden shrink-0 h-0 w-full md:h-full md:w-0 border-brand-5 transition-all duration-400">
                <!-- 詳細パネルのヘッダー -->
                <div class="shadow-brand bg-brand-2 h-16 ps-6 pe-1 flex justify-between items-center">
                    <h2 id="detail-title" class="text-xl font-black uppercase">Details</h2>
                    <div>
                        <!-- ▼ Aをマップ連携ボタンにする -->
                        <button id="detail-btn-map"   class="mr-1 w-10 h-10 border-1 bg-brand-1 shadow-brand text-black-3 text-[20px] font-bold">🗺️</button>
                        <!-- ▼ Bを編集ボタンにする -->
                        <button id="detail-btn-edit"  class="mr-1 w-10 h-10 border-1 bg-brand-1 shadow-brand text-black-3 text-[20px] font-bold">✏️</button>
                        <!-- 閉じるボタン -->
                        <button id="detail-btn-close" class="mr-1 w-10 h-10 border-1 bg-brand-1 shadow-brand text-black-3 text-[20px] font-bold">✕</button>
                    </div>
                </div>
                <!-- 詳細パネルの内容 -->
                <div id="ui-detail-content-id" class="bg-brand-0 flex-1 text-xs text-black-3 overflow-y-auto p-3">
                    <div class="mb-6">
                        <!-- 参照用（表示モード） -->
                        <div id="detail-display" class="hidden mt-3 space-y-5 text-black-4">
                            <div>
                                <div class="col-span-2 flex flex-col items-center">
                                    <!-- <label class="font-bold text-black-3 text-[10px] mb-0.5 uppercase">FACE</label> -->
                                    <div id="detail-display-face_emoji" class="text-[64px] h-16 flex items-center justify-center"></div>
                                </div>
                            </div>

                            <!-- META ROW -->
                            <div class="relative z-10 flex mb-5 border border-[#f0e0d0] rounded-2xl overflow-hidden bg-[#fff9f0]">
                                <div class="flex-1 flex flex-col items-center justify-center text-center py-2.5 px-3">
                                    <span class="block text-[9px] font-black tracking-[0.14em] uppercase text-[#a08c8c] mb-0.5">Date</span>
                                    <span id="detail-display-memo_date" class="text-[15px] font-bold text-[#3a2e2e]">2025/06/10</span>
                                </div>
                                <div class="flex-1 flex flex-col items-center justify-center text-center py-2.5 px-3">
                                    <span class="block text-[9px] font-black tracking-[0.14em] uppercase text-[#a08c8c] mb-0.5">Time</span>
                                    <span id="detail-display-memo_time" class="text-[15px] font-bold text-[#3a2e2e]">14:30</span>
                                </div>
                                <div class="flex-1 flex flex-col items-center justify-center text-center py-2.5 px-3">
                                    <span class="block text-[9px] font-black tracking-[0.14em] uppercase text-[#a08c8c] mb-0.5">Weather</span>
                                    <span id="detail-display-weather_emoji" class="text-[28px] leading-none">⛅</span>
                                </div>
                            </div>

                            <div class="border border-brand-2 p-2 bg-brand-1">
                                <!-- タイトル -->
                                <!-- <label class="block font-bold text-black-3 text-[10px] mb-1 uppercase">TITLE</label> -->
                                <div id="detail-display-title" class="w-full p-1 text-[16px] font-bold break-all min-h-[1.5rem]"></div>
                                <!-- 本文 -->
                                <!-- <label class="block font-bold text-black-3 text-[10px] mb-1 uppercase">BODY</label> -->
                                <div id="detail-display-body" class="w-full px-1 text-[16px] leading-relaxed whitespace-pre-wrap overflow-y-auto border border-transparent"></div>
                            </div>
                            <!-- 金額 -->
                            <div class="border border-brand-2 p-2 bg-brand-1">
                                <!-- <label class="block font-bold text-black-3 text-[10px] mb-1 uppercase">PRICE (JPY)</label> -->
                                <div class="w-full p-1 text-[16px] font-bold flex items-center">
                                    <span id="detail-display-price_symbol" class="mr-1"></span>
                                    <span id="detail-display-memo_price">0</span>
                                </div>
                            </div>
                            <!-- URL -->
                            <div class="border border-brand-2 p-2 bg-brand-1">
                                <!-- <label class="block font-bold text-black-3 text-[10px] mb-1 uppercase">URL</label> -->
                                <div class="w-full p-1 truncate">
                                    <a id="detail-display-link_url" href="" target="_blank" class="text-[12px] text-blue-500 underline break-all"></a>
                                </div>
                            </div>
                        </div>
                        <!-- 編集用（編集モード） -->
                        <form id="detail-edit" class="hidden mt-3 space-y-5 text-black-4">
                            <div class="grid grid-cols-10 gap-x-3 items-center border-b border-brand-3 pb-2">
                                <!-- 日付 -->
                                <div class="col-span-4">
                                    <label class="block font-bold text-black-3 text-[10px] mb-0.5">DATE</label>
                                    <input name="memo_date" id="detail-edit-memo_date" type="date"
                                        class="w-full bg-transparent outline-none text-[16px] px-0 leading-tight">
                                </div>
                                <!-- 時刻 -->
                                <div class="col-span-3">
                                    <label class="block font-bold text-black-3 text-[10px] mb-0.5">TIME</label>
                                    <input name="memo_time" id="detail-edit-memo_time" type="time"
                                        class="w-full bg-transparent outline-none text-[16px] px-0 leading-tight">
                                </div>
                                <!-- 表情 -->
                                <div class="col-span-1 flex flex-col items-center">
                                    <label class="font-bold text-black-3 text-[10px] mb-0.5">FACE</label>
                                    <button id="btn-face-trigger" type="button" class="h-10 w-10 border border-slate-200 bg-white active:scale-95 flex items-center justify-center">
                                        <span id="span-face-preview" class="text-[32px] leading-none"></span>
                                        <input name="face_emoji" id="detail-edit-face_emoji" type="hidden">
                                    </button>
                                </div>
                                <!-- 天気 -->
                                <div class="col-span-2 flex flex-col items-center">
                                    <label class="font-bold text-black-3 text-[10px] mb-0.5">WEATHER</label>
                                    <button id="btn-weather-trigger" type="button" class="h-10 w-10 border border-slate-200 bg-white active:scale-95 flex items-center justify-center">
                                        <span id="span-weather-preview" class="text-[32px] leading-none"></span>
                                        <input name="weather_emoji" id="detail-edit-weather_emoji" type="hidden">
                                    </button>
                                </div>
                            </div>
                            <!-- タイトル -->
                            <div>
                                <div class="flex justify-between items-end mb-1">
                                    <label class="font-bold text-black-3 text-[10px]">TITLE</label>
                                    <div class="text-[10px] text-black-2"><span id="detail-count-title">0</span>/50</div>
                                </div>
                                <input name="title" id="detail-edit-title" type="text" maxlength="50" 
                                    placeholder="タイトルを入力"
                                    class="w-full py-1 bg-transparent border-b border-brand-3 rounded-none focus:border-brand-5 outline-none text-[16px] px-0">
                            </div>
                            <!-- 本文 -->
                            <div>
                                <div class="flex justify-between items-end mb-1">
                                    <label class="font-bold text-black-3 text-[10px]">BODY</label>
                                    <div class="text-[10px] text-black-2"><span id="detail-count-body">0</span>/500</div>
                                </div>
                                <textarea name="body" id="detail-edit-body" maxlength="500" 
                                    placeholder="本文を入力してください"
                                    class="w-full p-2 bg-white border border-brand-3 rounded h-48 focus:border-brand-5 outline-none text-[16px] resize-none"></textarea>
                            </div>
                            <!-- 金額 -->
                            <div>
                                <label class="block font-bold text-black-3 text-[10px] mb-1">PRICE (JPY)</label>
                                <div class="grid grid-cols-2 gap-x-3">
                                    <!-- 金額（プラス） -->
                                    <div class="relative flex items-center">
                                        <span class="absolute left-2 text-blue-500 font-bold text-[16px]">＋</span>
                                        <input id="detail-edit-price_plus" type="number" placeholder="0"
                                            class="text-right w-full pr-2 py-1 bg-blue-50/50 border-b border-blue-300 rounded-t focus:bg-blue-50 focus:border-blue-500 outline-none text-[16px] text-blue-700 transition-colors">
                                    </div>
                                    <!-- 金額（マイナス） -->
                                    <div class="relative flex items-center">
                                        <span class="absolute left-2 text-red-500 font-bold text-[16px]">－</span>
                                        <input id="detail-edit-price_minus" type="number" placeholder="0"
                                            class="text-right w-full pr-2 py-1 bg-red-50/50 border-b border-red-300 rounded-t focus:bg-red-50 focus:border-red-500 outline-none text-[16px] text-red-700 transition-colors">
                                    </div>
                                </div>
                            </div>
                            <!-- URL -->
                            <div>
                                <div class="flex justify-between items-end mb-1">
                                    <label class="font-bold text-black-3 text-[10px]">URL</label>
                                    <div class="text-[10px] text-black-2"><span id="detail-count-url">0</span>/200</div>
                                </div>
                                <input name="link_url" id="detail-edit-link_url" type="url" maxlength="200"
                                    placeholder="https://..."
                                    class="w-full py-1 bg-transparent border-b border-brand-3 rounded-none focus:border-brand-5 outline-none text-[16px] px-0 text-blue-600">
                            </div>
                            <!-- 隠しフィールド -->
                            <div class="hidden">
                                <input name="archive_id" id="detail-edit-archive_id" type="hidden" value="">
                                <input name="seq" id="detail-edit-seq" type="hidden" value="">
                                <input name="latitude" id="detail-edit-latitude" type="hidden" value="">
                                <input name="longitude" id="detail-edit-longitude" type="hidden" value="">
                                <input name="memo_price" id="detail-edit-memo_price" type="hidden" value="0">
                            </div>
                        </form>
                    </div>
                    <!-- 詳細パネルのフッター -->
                    <div class="shadow-brand ">
                        <!-- （いいねボタン） -->
                        <div id="detail-group-reaction" class="shrink-0 flex h-10 bg-brand-2">
                            <button id="detail-btn-amazing" class="flex-1 text-black text-[16px]">Amazing</button>
                            <button id="detail-btn-helpful" class="flex-1 text-black text-[16px]">Helpful</button>
                            <button id="detail-btn-funny"   class="flex-1 text-black text-[16px]">Funny</button>
                            <button id="detail-btn-try"     class="flex-1 text-black text-[16px]">Wanna Try</button>
                        </div>
                        <!-- （マーカー移動） -->
                        <div id="detail-group-move" class="shrink-0 flex h-10 bg-brand-3">
                            <button id="detail-btn-first" class="flex-1 text-black text-[16px]">◀◀</button>
                            <button id="detail-btn-prev"  class="flex-1 text-black text-[16px]">◀</button>
                            <button id="detail-btn-next"  class="flex-1 text-black text-[16px]">▶</button>
                            <button id="detail-btn-last"  class="flex-1 text-black text-[16px]">▶▶</button>
                        </div>
                        <!-- （キャンセル・保存） -->
                        <div class="shrink-0 flex h-16">
                            <button id="detail-btn-cancel" class="flex-1 bg-brand-close text-white font-bold text-[16px]">CANCEL</button>
                            <button id="detail-btn-save" class="flex-1 bg-brand-4 text-white font-bold text-[16px]">SAVE DATA</button>
                        </div>
                    </div>
                </div>
                <div class="h-4 bg-brand-0"></div>
            </div>
        </div>
        <!-- ■　アプリ下部 -->
        <div class="absolute bottom-4 left-0 right-0 z-[1001]">
            <!-- ■　アイコンバー -->
            <div id="ui-bottom-bar" class="mx-2 bg-transparent flex items-end justify-between mb-3">
                <!-- 左 -->
                <div>
                    <div class="w-10"></div>
                </div>
                <!-- 中央 -->
                <div>
                    <!-- 新規登録ボタン -->
                    <button id="btn-create" class="shadow-brand w-16 h-16 bg-brand-5 text-white font-black text-[12px]">
                        create
                    </button>
                    <!-- まとめ親 -->
                    <div id="bot-group-move" class="space-x-2">
                        <button id="btn-bot-move-prev" class="shadow-brand h-10 w-10 bg-brand-3 text-[12px]">◀</button>
                        <button id="btn-bot-move-open" class="shadow-brand h-10 w-10 bg-brand-3 text-[12px]">●</button>
                        <button id="btn-bot-move-next" class="shadow-brand h-10 w-10 bg-brand-3 text-[12px]">▶</button>
                    </div>
                    <!-- 地点検索ボタン -->
                    <button id="btn-search" class="hidden shadow-brand w-16 h-16 bg-brand-5 text-white font-black text-[12px]">
                        Search
                    </button>
                </div>
                <!-- 右 -->
                <div>
                    <!-- アプリメニュー -->
                    <button id="btn-app-menu" class="shadow-brand bg-brand-1 text-brand-5 w-10 h-10 border-2 border-brand-4 text-[12px] font-bold">
                        app
                    </button>
                        <!-- ポップアップ -->
                        <div id="pop-app-menu" class="hidden shadow-brand absolute bottom-12 right-0 w-32 bg-brand-0 border border-brand-3 shadow-xl z-[1100]">
                            <div id="app-menu-1" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 1
                            </div>
                            <div id="app-menu-2" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 2
                            </div>
                            <div id="app-menu-3" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 3
                            </div>
                            <div id="app-menu-4" class="p-2 border-b border-brand-2 text-[12px] font-bold hover:bg-brand-2 cursor-pointer uppercase">
                                system menu 4
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>

    <!-- その他 -->
    <div>
        <!-- ■　ダイアログ -->
        <div id="ui-dialog-root">
            <!-- ダイアログ生成物 -->
        </div>
        <!-- ■　テンプレート -->
        <div id="ui-template-root">
            <!-- テンプレート生成物 -->
        </div>
        <!-- ■　共通バックドロップ -->
        <div id="ui-dialog-backdrop" class="z-[1999] fixed inset-0 hidden backdrop-blur-[4px] "></div>

        <!-- ■　Toast を積み上げるコンテナ -->
        <div id="toast-container" class="fixed bottom-20 left-1/2 -translate-x-1/2 flex flex-col gap-2 z-[9999]"></div>

        <!-- 【マップ】ポップアップ -->
        <template id="tpl-marker-popup">
            <div class="w-[150px] p-1 grid grid-cols-10">
                <!-- index（上段2） -->
                <div class="col-span-10 flex items-center text-[12px] font-bold justify-center_">
                    <span class="index"></span>
                </div>
                <!-- 日時（上段8） -->
                <div class="col-span-10 flex items-center text-[12px] font-bold justify-center_">
                    <span class="time"></span>
                </div>
                <!-- タイトル（下段8） -->
                <div class="col-span-10 p-1 flex items-center text-[10px] font-bold">
                    <span class="title"></span>
                </div>
            </div>
        </template>
        <!-- ローディング用 -->
        <template id="tpl-loading">
            <div class="
                fixed inset-0 bg-black/40 flex items-center justify-center
                opacity-0 pointer-events-none transition-all duration-300
                z-[9998]
            ">
                <div class="text-3xl font-bold text-white inline-block wait-dots">
                    Wait
                </div>
            </div>
        </template>

    </div>

</div>

<!-- テスト用データ -->
<script type="module" src="./js/test-data.js"></script>
<!-- アプリモジュール -->
<script type="module" src="./js/app-const.js"></script>
<script type="module" src="./js/common.js"></script>
<script type="module" src="./js/app-data.js"></script>

<!-- UI部品 -->
<script type="module">
    // UI管理
    import UI from "./js/component/ui-manager.js";
    window.$UI = UI;
    // 上部バー
    import TopBar from "./js/component/top-bar-controller.js";
    window.$TopBar = TopBar;
    // 下部バー
    import BotBar from "./js/component/bottom-bar-controller.js";
    window.$BotBar = BotBar;
    // 詳細画面（フレーム）
    import DetailFrame from "./js/component/detail-frame-controller.js";
    window.$DetailFrame = DetailFrame;
    // 詳細画面（項目群）
    import DetailContent from "./js/component/detail-content-controller.js";
    window.$DetailContent = DetailContent;
    // 地図
    import Map from "./js/component/map-controller.js";
    window.$Map = Map;
    // 地図
    import Marker from "./js/component/marker-controller.js";
    window.$Marker = Marker;
</script>
<!-- アプリ基幹部品 -->
<script type="module">
    // ローカル㏈（indexedDB）
    import db from "./js/local-db-controller.js";
    window.$Db = db;
    // 通知管理
    import Notice from "./js/notice-manager.js";
    window.$Notice = Notice;
    // ダイアログ管理
    import Dialog from "./js/dialog-manager.js";
    window.$Dialog = Dialog;
    // ローカル㏈（indexedDB）
    import polling from "./js/polling-manager.js";
    window.$Polling = polling;
    // 認証管理
    import Auth from "./js/auth-manager.js";
